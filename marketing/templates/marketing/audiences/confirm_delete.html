{% extends 'marketing/base.html' %}

{% block title %}Удаление аудитории — ZPT.KZ{% endblock %}

{% block content %}
<section class="marketing-section">
  <h1 class="marketing-page-title">Удалить аудиторию?</h1>
  <p>Аудитория «{{ audience.name }}» будет удалена без возможности восстановления.</p>
  <form method="post" class="marketing-form">
    {% csrf_token %}
    <input type="hidden" name="confirm" value="yes">
    <div class="marketing-form-actions">
      <button type="submit" class="marketing-btn marketing-btn--danger">Подтвердить удаление</button>
      <a class="marketing-btn" href="{% url 'marketing:audience_detail' audience.pk %}">Отмена</a>
    </div>
  </form>
</section>
{% endblock %}
