{% load campaign_ui %}
<details class="campaign-actions-menu">
  <summary class="marketing-btn campaign-actions-menu__toggle">Действия ▾</summary>
  <div class="campaign-actions-menu__panel">
    {% if actions.edit %}
      <a class="campaign-actions-menu__link" href="{% url 'marketing:campaign_edit' campaign.pk %}">Изменить</a>
    {% endif %}
    <form method="post" action="{% url 'marketing:campaign_copy' campaign.pk %}" class="marketing-inline-form">
      {% csrf_token %}
      <button type="submit" class="campaign-actions-menu__link">Копировать</button>
    </form>
    {% if actions.prepare %}
      <form method="post" action="{% url 'marketing:campaign_prepare' campaign.pk %}" class="marketing-inline-form">
        {% csrf_token %}
        <button type="submit" class="campaign-actions-menu__link">Подготовить получателей</button>
      </form>
    {% endif %}
    {% if actions.archive %}
      <form method="post" action="{% url 'marketing:campaign_archive' campaign.pk %}" class="marketing-inline-form">
        {% csrf_token %}
        <button type="submit" class="campaign-actions-menu__link">Архивировать</button>
      </form>
    {% endif %}
    {% if actions.cancel %}
      <form method="post" action="{% url 'marketing:campaign_cancel' campaign.pk %}" class="marketing-inline-form">
        {% csrf_token %}
        <button type="submit" class="campaign-actions-menu__link">Отменить</button>
      </form>
    {% endif %}
    {% if actions.delete %}
      <a class="campaign-actions-menu__link campaign-actions-menu__link--danger" href="{% url 'marketing:campaign_delete' campaign.pk %}">Удалить</a>
    {% endif %}
  </div>
</details>
