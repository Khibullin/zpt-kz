{% if show_seller_socials and seller %}
  {% if seller.instagram or seller.website %}
    <div class="seller-trust-socials{% if wrapper_class %} {{ wrapper_class }}{% endif %}">
      {% if seller.instagram %}
        <a
          href="{{ seller.instagram }}"
          target="_blank"
          rel="noopener noreferrer"
          class="{% if compact %}seller-mini-chip insta-chip{% else %}seller-social-chip seller-social-chip-instagram{% endif %}"
          {% if compact %}title="Instagram продавца"{% endif %}
        >{% if compact %}Inst{% else %}Instagram{% endif %}</a>
      {% endif %}

      {% if seller.website %}
        <a
          href="{{ seller.website }}"
          target="_blank"
          rel="noopener noreferrer"
          class="{% if compact %}seller-mini-chip site-chip{% else %}seller-social-chip seller-social-chip-website{% endif %}"
          {% if compact %}title="Сайт продавца"{% endif %}
        >Сайт</a>
      {% endif %}
    </div>
  {% endif %}
{% endif %}
