<div
  class="feedback-modal"
  id="feedbackModal"
  data-feedback-url="{% url 'feedback' %}"
  aria-hidden="true"
>
  <div class="feedback-modal-overlay modal-overlay" data-feedback-close></div>

  <div
    class="feedback-modal-window modal-window"
    role="dialog"
    aria-modal="true"
    aria-labelledby="feedbackModalTitle"
  >
    <button type="button" class="feedback-modal-close" data-feedback-close aria-label="Закрыть">
      ×
    </button>

    <h2 id="feedbackModalTitle">Обратная связь</h2>
    <p class="feedback-modal-lead">
      Оставьте сообщение — мы свяжемся с вами в ближайшее время.
    </p>

    <div class="feedback-modal-success" id="feedbackModalSuccess" hidden role="status"></div>
    <div class="feedback-modal-error" id="feedbackModalError" hidden role="alert"></div>

    <form class="feedback-modal-form" id="feedbackModalForm" novalidate>
      {% csrf_token %}

      <div class="feedback-modal-field">
        <label for="feedbackModalName">Ваше имя</label>
        <input
          type="text"
          id="feedbackModalName"
          name="name"
          placeholder="Как к вам обращаться"
          autocomplete="name"
          required
        >
      </div>

      <div class="feedback-modal-field">
        <label for="feedbackModalPhone">Телефон / WhatsApp</label>
        <input
          type="tel"
          id="feedbackModalPhone"
          name="phone"
          placeholder="Например: 7771234567"
          autocomplete="tel"
          required
        >
      </div>

      <div class="feedback-modal-field">
        <label for="feedbackModalMessage">Сообщение</label>
        <textarea
          id="feedbackModalMessage"
          name="message"
          rows="4"
          placeholder="Опишите вопрос или предложение"
          required
        ></textarea>
      </div>

      <button type="submit" class="feedback-modal-submit">Отправить</button>
    </form>
  </div>
</div>
