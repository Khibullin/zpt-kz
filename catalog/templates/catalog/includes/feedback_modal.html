<div class="feedback-modal" id="feedbackModal" hidden aria-hidden="true">
  <div class="feedback-modal-backdrop" data-feedback-close></div>
  <div
    class="feedback-modal-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="feedbackModalTitle"
  >
    <button type="button" class="feedback-modal-close" data-feedback-close aria-label="Закрыть">
      ×
    </button>

    <h2 id="feedbackModalTitle">Обратная связь</h2>
    <p class="feedback-modal-lead">
      Оставьте сообщение — мы свяжемся с вами.
    </p>

    <div class="feedback-modal-success" id="feedbackModalSuccess" hidden role="status">
      Спасибо! Мы получили ваше сообщение.
    </div>

    <form class="feedback-form feedback-modal-form" id="feedbackModalForm" novalidate>
      {% csrf_token %}
      <input type="hidden" name="name" id="feedbackModalName">
      <input type="hidden" name="phone" id="feedbackModalPhoneHidden">
      <input type="hidden" name="message" id="feedbackModalMessageHidden">

      <div class="feedback-field">
        <label for="feedbackModalNameInput">Ваше имя</label>
        <input
          type="text"
          id="feedbackModalNameInput"
          placeholder="Как к вам обращаться"
          autocomplete="name"
          required
        >
      </div>

      <div class="feedback-field">
        <label for="feedbackModalPhoneInput">Телефон / WhatsApp</label>
        <input
          type="tel"
          id="feedbackModalPhoneInput"
          placeholder="Например: 7771234567"
          autocomplete="tel"
          required
        >
      </div>

      <div class="feedback-field">
        <label for="feedbackModalMessageInput">Сообщение</label>
        <textarea
          id="feedbackModalMessageInput"
          rows="4"
          placeholder="Опишите вопрос или предложение"
          required
        ></textarea>
      </div>

      <div class="feedback-modal-error" id="feedbackModalError" hidden></div>

      <button type="submit" class="btn feedback-submit-btn">Отправить</button>
    </form>
  </div>
</div>
