{% load static %}
<header class="market-topbar header site-header">
  <div class="market-topbar-inner topbar-inner header-inner market-header-flex site-container">

    <div class="market-brand-block">
      {% include 'includes/site_logo.html' with show_subtitle=True %}
      <a href="{% url 'seller_landing' %}" class="market-mobile-seller-cta no-underline">
        Продавцам и СТО: получать заказы в WhatsApp →
      </a>
    </div>

    <div class="market-topbar-actions market-header-actions">
      <a href="{% url 'orders:cart' %}" class="market-cart-link no-underline" title="Корзина">
        <span class="market-cart-icon" aria-hidden="true">🛒</span>
        <span class="market-cart-label">Корзина</span>
        <span class="market-cart-badge" data-cart-count {% if not cart_count %}hidden{% endif %}>
          {{ cart_count|default:0 }}
        </span>
      </a>

      <a href="{% url 'seller_landing' %}" class="seller-cabinet-btn market-header-cabinet no-underline">
        <svg class="seller-cabinet-icon" viewBox="0 0 24 24" aria-hidden="true" width="16" height="16">
          <path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <span class="seller-cabinet-label">Продавать на ZPT.KZ</span>
      </a>
    </div>

  </div>
</header>
