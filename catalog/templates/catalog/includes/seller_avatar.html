{% if seller.logo %}
  {% if link %}
  <a
    href="{{ link }}"
    class="seller-logo-link{% if wrapper_class %} {{ wrapper_class }}{% endif %}"
    {% if title %} title="{{ title }}"{% endif %}
  >
  {% elif wrapper_class %}
  <div class="{{ wrapper_class }}">
  {% elif size == 'sm' %}
  <span class="product-seller-logo-wrap">
  {% endif %}
    <img
      class="seller-logo seller-logo--{{ size }}"
      src="{{ seller.logo.url }}"
      alt="Логотип {{ seller.name }}"
      {% if size == 'sm' %}loading="lazy"{% endif %}
    >
  {% if link %}
  </a>
  {% elif wrapper_class %}
  </div>
  {% elif size == 'sm' %}
  </span>
  {% endif %}
{% endif %}
