<div
  class="product-buy-controls"
  data-product-id="{{ product.id }}"
  data-product-article="{{ product.article|default:'' }}"
  data-product-supplier="{{ product.supplier|default:'local' }}"
>
  <div class="product-qty-row">
    <button type="button" class="qty-btn" data-qty-minus aria-label="Уменьшить количество">−</button>
    <input
      type="text"
      class="qty-input"
      value="1"
      readonly
      tabindex="-1"
      aria-label="Количество"
    >
    <button type="button" class="qty-btn" data-qty-plus aria-label="Увеличить количество">+</button>
  </div>
  <button
    type="button"
    class="product-buy-btn btn-buy-catalog"
    data-cart-add
    data-product-id="{{ product.id }}"
    data-product-article="{{ product.article|default:'' }}"
    data-product-supplier="{{ product.supplier|default:'local' }}"
  >
    <span class="product-buy-btn-icon" aria-hidden="true">🛒</span>
    <span class="product-buy-btn-text">Купить</span>
  </button>
</div>
