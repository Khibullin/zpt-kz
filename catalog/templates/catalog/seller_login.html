{% extends 'base.html' %}
{% load static %}

{% block title %}Вход продавца — ZPT.KZ{% endblock %}

{% block content %}
<header class="topbar seller-auth-header">
  <div class="container topbar-inner">

    <a
      class="brand"
      href="https://zpt.kz/"
    >
      <img
        src="{% static 'images/logo.png' %}"
        alt="ZPT.KZ"
      >
    </a>

  </div>
</header>

<section class="section">
  <div class="container">
    <div class="seller-page-card">
      <h2>Вход продавца</h2>

      {% if error_message %}
        <div class="form-error">{{ error_message }}</div>
      {% endif %}

      <form method="post" class="seller-form" action="" autocomplete="on">
        {% csrf_token %}

        <p>
          <label for="username">
            WhatsApp / Логин
          </label>

          <input
            type="text"
            id="username"
            name="username"
            required
            autocomplete="username"
            inputmode="tel"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="77713607040"
            value="{{ username|default:'' }}"
          >
        </p>

        <p>
          <label for="password">
            Пароль
          </label>

          <input
            type="password"
            id="password"
            name="password"
            required
            autocomplete="current-password"
          >

          <label class="seller-form-show-password">
            <input
              type="checkbox"
              onclick="togglePasswordLogin()"
            >
            Показать пароль
          </label>
        </p>

        <label class="seller-form-remember">
          <input
            type="checkbox"
            name="remember_me"
            {% if remember_me %}checked{% endif %}
          >
          Запомнить меня
        </label>

        <button type="submit" class="btn red">Войти</button>
      </form>

<div
  class="register-box"
  style="
    margin-top:18px;
    padding-top:14px;
    border-top:1px solid #ececec;
    text-align:center;
    font-size:15px;
    color:#666;
  "
>
  Нет аккаунта?

  <a
    href="{% url 'seller_register' %}"
    style="
      color:#ef3e2f;
      font-weight:700;
      text-decoration:none;
      margin-left:4px;
    "
  >
    Зарегистрироваться →
  </a>
</div>
    </div>
  </div>
</section>
<script>
function togglePasswordLogin() {

  const input = document.getElementById("password");

  if (input.type === "password") {
    input.type = "text";
  } else {
    input.type = "password";
  }

}
</script>
{% endblock %}
