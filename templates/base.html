{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}ZPT Market{% endblock %}</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="ZPT.KZ — Автомобильная платформа Казахстана">
    <meta property="og:description" content="Поиск автозапчастей, маркетплейс товаров от проверенных продавцов и подбор СТО/детейлинга.">
    <meta property="og:url" content="https://zpt.kz">
    <meta property="og:image" content="https://zpt.kz{% static 'favicon/android-chrome-512x512.png' %}">
    <meta property="og:image:width" content="512">
    <meta property="og:image:height" content="512">

    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}?v=3">
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}?v=3">
    <link rel="apple-touch-icon" href="{% static 'images/apple-touch-icon.png' %}?v=3">

 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
  rel="stylesheet"
>
<link rel="stylesheet" href="{% static 'css/style.css' %}?v=faq_feedback_modal_v105">
    {% block extra_css %}{% endblock %}
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
