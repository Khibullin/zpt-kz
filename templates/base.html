{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ZPT.kz">
    <meta name="csrf-token" content="{{ csrf_token }}">

    <title>{% block title %}ZPT Market{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}ZPT.KZ — маркетплейс автозапчастей в Казахстане.{% endblock %}">

    <link rel="manifest" href="/manifest.json">

    <meta property="og:type" content="website">
    <meta property="og:title" content="ZPT.KZ — Автомобильная платформа Казахстана">
    <meta property="og:description" content="Поиск автозапчастей, маркетплейс товаров от проверенных продавцов и подбор СТО/детейлинга.">
    <meta property="og:url" content="https://zpt.kz">
    <meta property="og:image" content="https://zpt.kz{% static 'favicon/android-chrome-512x512.png' %}">
    <meta property="og:image:width" content="512">
    <meta property="og:image:height" content="512">

    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}?v=3">
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/pwa-icon-180.png' %}?v=1">

 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
  rel="stylesheet"
>
<link rel="stylesheet" href="{% static 'css/style.css' %}?v=seller_profile_cards_v2">
<link rel="stylesheet" href="{% static 'css/design-system.css' %}?v=1">
<link rel="stylesheet" href="{% static 'css/faq-feedback.css' %}?v=market_v110">
<link rel="stylesheet" href="{% static 'css/ios-pwa-prompt.css' %}?v=ios_pwa_v1">
    {% block extra_css %}{% endblock %}
</head>
<body>
{% block content %}{% endblock %}
{% include 'includes/ios_pwa_prompt.html' %}
{% include 'catalog/includes/feedback_modal.html' %}
<script src="{% static 'js/feedback-modal.js' %}?v=market_v110"></script>
<script src="{% static 'js/ios-pwa-prompt.js' %}?v=ios_pwa_v1"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js', { scope: '/' });
}
</script>
</body>
</html>
