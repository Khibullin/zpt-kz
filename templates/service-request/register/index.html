<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Регистрация исполнителя — ZPT.KZ</title>

<link rel="icon" href="/static/favicon/favicon.ico" sizes="any">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#f5f5f5;
  color:#222;
}

.header{
  background:#fff;
  border-bottom:1px solid #ececec;
  box-shadow:0 2px 10px rgba(0,0,0,.04);
}

.header-inner{
  max-width:1100px;
  margin:auto;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:24px;
  font-weight:bold;
  color:#c62828;
  text-decoration:none;
}

.nav{
  display:flex;
  gap:10px;
}

.nav a{
  padding:10px 14px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  font-size:14px;
}

.nav-main{
  background:#eef2f7;
  color:#3478f6;
}

.nav-seller{
  background:#3478f6;
  color:#fff;
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:24px 16px;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:24px;
  box-shadow:0 6px 24px rgba(0,0,0,.08);
}

h1{
  margin-top:0;
  margin-bottom:18px;
  color:#c62828;
  font-size:38px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.field{
  display:flex;
  flex-direction:column;
}

.field.full{
  grid-column:1/-1;
}

label{
  font-weight:bold;
  margin-bottom:6px;
}

input,
select,
button{
  width:100%;
  min-height:48px;
  border-radius:12px;
  border:1px solid #d7d7d7;
  padding:0 14px;
  font-size:15px;
}

.check-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.check-grid label{
  font-weight:normal;
  border:1px solid #e0e0e0;
  border-radius:12px;
  padding:12px;
  background:#fafafa;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:10px;
  margin:0;
}

.check-grid input{
  width:auto;
  min-height:auto;
}

.submit-btn{
  background:#3478f6;
  color:#fff;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.msg{
  margin-top:16px;
  padding:14px;
  border-radius:12px;
  display:none;
}

.msg.success{
  display:block;
  background:#e8f5e9;
  color:#1b5e20;
}

.msg.error{
  display:block;
  background:#ffebee;
  color:#b71c1c;
}

@media(max-width:760px){

  .grid{
    grid-template-columns:1fr;
  }

  .check-grid{
    grid-template-columns:1fr;
  }

  h1{
    font-size:30px;
  }

}
</style>
</head>

<body>

<header class="header">
  <div class="header-inner">

    <a class="logo" href="/">ZPT.KZ</a>

    <div class="nav">
      <a class="nav-main" href="/service-request/">Заявка клиента</a>
      <a class="nav-seller" href="/service-request/cabinet/">Кабинет</a>
    </div>

  </div>
</header>

<div class="wrap">

  <div class="card">

    <h1>Регистрация исполнителя</h1>

    <form id="registerForm">

      <div class="grid">

        <div class="field">
          <label>Название компании / имя мастера</label>
          <input name="name" placeholder="Например: RH Service" required>
        </div>

        <div class="field">
          <label>WhatsApp</label>
          <input name="whatsapp" placeholder="77011234567" required>
        </div>

<div class="field">

  <label>Пароль</label>

  <div style="display:flex;gap:10px">

    <input
      id="passwordInput"
      name="password"
      type="password"
      required
    >

    <button
      type="button"
      onclick="togglePassword()"
      style="
        width:140px;
        min-height:48px;
        border:none;
        border-radius:12px;
        background:#eef2f7;
        cursor:pointer;
        font-weight:bold;
      "
    >
      Показать
    </button>

  </div>

</div>

        <div class="field">
          <label>Тип: СТО / Детейлинг</label>

          <select name="seller_type" required>
            <option value="">Выберите тип</option>
            <option value="sto">СТО</option>
            <option value="detailing">Детейлинг</option>
          </select>
        </div>

        <div class="field">
          <label>Город</label>
          <select name="city" required>
  <option value="">Выберите город</option>

  <option value="Алматы">Алматы</option>
  <option value="Астана">Астана</option>
  <option value="Шымкент">Шымкент</option>
  <option value="Караганда">Караганда</option>

  <option disabled>──────────</option>

  <option value="Актобе">Актобе</option>
  <option value="Атырау">Атырау</option>
  <option value="Актау">Актау</option>
  <option value="Павлодар">Павлодар</option>

  <option value="Усть-Каменогорск">Усть-Каменогорск</option>
  <option value="Семей">Семей</option>
  <option value="Костанай">Костанай</option>
  <option value="Петропавловск">Петропавловск</option>

  <option value="Кокшетау">Кокшетау</option>
  <option value="Тараз">Тараз</option>
  <option value="Туркестан">Туркестан</option>
  <option value="Кызылорда">Кызылорда</option>

  <option value="Уральск">Уральск</option>
  <option value="Талдыкорган">Талдыкорган</option>
  <option value="Жезказган">Жезказган</option>
  <option value="Экибастуз">Экибастуз</option>
</select>
        </div>

        <div class="field">
          <label>Район</label>
          <input name="district" placeholder="Бостандыкский">
        </div>

        <div class="field">
          <label>Адрес СТО</label>
          <input name="address" placeholder="Муратбаева 94">
        </div>

        <div class="field">
          <label>Ссылка на карту 2GIS</label>
          <input name="map_link" placeholder="https://2gis.kz/...">
<div style="font-size:13px;color:#666;margin-top:6px">
  Откройте вашу точку в 2GIS и вставьте ссылку сюда
</div>
        </div>

        <div class="field full">

          <label>Какие услуги оказываете?</label>

          <div class="check-grid">

            <label><input type="checkbox" name="services" value="Диагностика">Диагностика</label>

            <label><input type="checkbox" name="services" value="Двигатель">Двигатель</label>

            <label><input type="checkbox" name="services" value="Ходовая часть">Ходовая часть</label>

            <label><input type="checkbox" name="services" value="Тормозная система">Тормозная система</label>

            <label><input type="checkbox" name="services" value="Рулевое управление">Рулевое управление</label>

            <label><input type="checkbox" name="services" value="КПП / АКПП">КПП / АКПП</label>

            <label><input type="checkbox" name="services" value="Электрика">Электрика</label>

            <label><input type="checkbox" name="services" value="Кондиционер / печка">Кондиционер / печка</label>

            <label><input type="checkbox" name="services" value="Кузовной ремонт">Кузовной ремонт</label>

            <label><input type="checkbox" name="services" value="Сварочные работы">Сварочные работы</label>

            <label><input type="checkbox" name="services" value="Замена масел / ТО">Замена масел / ТО</label>

            <label><input type="checkbox" name="services" value="Выездной мастер">Выездной мастер</label>

            <label><input type="checkbox" name="services" value="Другое">Другое</label>

          </div>

        </div>

        <div class="field full">
          <button type="submit" class="submit-btn">
            Зарегистрироваться
          </button>
        </div>

      </div>

    </form>

    <div id="result" class="msg"></div>

  </div>

</div>

<script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {

  e.preventDefault();

  const form = e.target;

  const services = Array.from(
    form.querySelectorAll('input[name="services"]:checked')
  ).map(item => item.value);

  const data = {
    name: form.name.value.trim(),
    whatsapp: form.whatsapp.value.trim(),
    password: form.password.value.trim(),
    seller_type: form.seller_type.value,
    city: form.city.value.trim(),
    district: form.district.value.trim(),
    address: form.address.value.trim(),
    map_link: form.map_link.value.trim(),
    services: services
  };

  const result = document.getElementById("result");

  result.className = 'msg';
  result.innerHTML = '';

  try {

    const response = await fetch(
      window.location.origin + "/api/service/create-service-seller/",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      }
    );

    const json = await response.json();

    if (!response.ok || json.error) {

      result.className = 'msg error';
      result.innerHTML = json.error || "Ошибка регистрации";

      return;
    }

    result.className = 'msg success';
    result.innerHTML = "Исполнитель зарегистрирован";

    localStorage.setItem(
      "service_seller_id",
      json.seller_id
    );

    setTimeout(()=>{
      window.location.href =
        "/service-request/cabinet/";
    },700);

  } catch (error) {

    result.className = 'msg error';
    result.innerHTML =
      "Ошибка соединения с сервером";

  }

});
function togglePassword(){

  const input =
    document.getElementById('passwordInput');

  input.type =
    input.type === 'password'
      ? 'text'
      : 'password';
}
</script>

</body>
</html>
