<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Кабинет исполнителя — ZPT.KZ</title>
<link rel="icon" href="/static/favicon/favicon.ico" sizes="any">

<style>
*{
  box-sizing:border-box;
}

:root{
  --red:#e51b23;
  --blue:#3478f6;
  --green:#22c55e;
  --text:#1e293b;
  --muted:#64748b;
  --bg:#f3f5f8;
  --card:#ffffff;
  --soft:#f8fafc;
  --line:#dbe3ef;
  --yellow:#f59e0b;
  --purple:#6d5dfc;
  --slate:#5b6f90;
  --slate-dark:#4b5d79;
}

body{
  margin:0;
  font-family:Inter,Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

.header{
  background:#fff;
  border-bottom:1px solid #e5e7eb;
}

.header-inner{
  max-width:1200px;
  margin:auto;
  padding:16px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
}

.logo{
  font-size:30px;
  font-weight:800;
  color:var(--red);
  text-decoration:none;
  letter-spacing:.4px;
}

.nav{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.nav a{
  padding:12px 18px;
  border-radius:12px;
  text-decoration:none;
  font-weight:700;
  font-size:15px;
}

.nav-main{
  background:#eef2f7;
  color:var(--blue);
}

.nav-seller{
  background:var(--blue);
  color:#fff;
}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:28px 20px;
}

.card{
  background:var(--card);
  border-radius:22px;
  padding:26px;
  margin-bottom:22px;
  box-shadow:0 10px 30px rgba(15,23,42,.08);
}

.hero{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:18px;
  margin-bottom:18px;
}

.hero h1{
  margin:0;
  color:#c62828;
  font-size:36px;
  line-height:1.1;
  font-weight:700;
}

.hero p{
  margin:8px 0 0;
  color:var(--muted);
  font-size:15px;
}

.cabinet-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:11px 16px;
  border-radius:999px;
  font-weight:700;
  font-size:15px;
  white-space:nowrap;
}

.cabinet-badge.active{
  background:#dcfce7;
  color:#15803d;
}

.cabinet-badge.inactive{
  background:#fee2e2;
  color:#b91c1c;
}

.cabinet-badge span{
  width:8px;
  height:8px;
  border-radius:50%;
  background:currentColor;
}

.tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-bottom:16px;
}

.tabs button{
  min-height:54px;
  border:1px solid #dbe3ef;
  border-radius:13px;
  background:#fff;
  color:#334155;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  transition:.18s;
}

.tabs button.active{
  background:linear-gradient(135deg,#3478f6,#2563eb);
  color:#fff;
  box-shadow:0 8px 20px rgba(52,120,246,.18);
}

.tabs button.danger-tab{
  background:#fff;
  color:#c62828;
}

.status-buttons{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  margin-bottom:16px;
}

.status-buttons button{
  min-height:44px;
  border:1px solid #dbe3ef;
  border-radius:11px;
  background:#fff;
  color:#475569;
  font-weight:700;
  cursor:pointer;
  transition:.18s;
}

.status-buttons button.active{
  color:#fff;
}

.status-buttons button.all.active{
  background:linear-gradient(135deg,#5b6f90,#4b5d79);
  color:#fff;
  box-shadow:0 6px 18px rgba(75,93,121,.18);
}

.status-buttons button.new.active{
  background:linear-gradient(135deg,#3478f6,#2563eb);
}

.status-buttons button.viewed.active{
  background:linear-gradient(135deg,#f59e0b,#d97706);
}

.status-buttons button.work.active{
  background:linear-gradient(135deg,#6d5dfc,#5747d9);
}

.status-buttons button.done.active{
  background:linear-gradient(135deg,#22c55e,#16a34a);
}

.field{
  margin-bottom:14px;
}

label{
  display:block;
  font-size:14px;
  font-weight:700;
  margin-bottom:7px;
  color:#334155;
}

input,
select{
  width:100%;
  min-height:50px;
  padding:0 14px;
  border:1px solid #cfd8e3;
  border-radius:12px;
  background:#fff;
  font-size:15px;
  color:#1e293b;
  outline:none;
}

input:focus,
select:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(52,120,246,.12);
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.form-grid .full{
  grid-column:1/-1;
}

.btn{
  width:100%;
  min-height:52px;
  border:none;
  border-radius:13px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

.btn-blue{
  background:var(--blue);
  color:#fff;
}

.btn-green{
  background:var(--green);
  color:#fff;
}

.btn-gray{
  background:#eef2f7;
  color:#334155;
}

.login-card{
  max-width:520px;
  margin:60px auto;
}

.password-row{
  display:flex;
  gap:10px;
}

.password-row input{
  flex:1;
}

.password-row button{
  width:140px;
  border:none;
  border-radius:12px;
  background:#eef2f7;
  color:#334155;
  font-weight:700;
  cursor:pointer;
}

.profile-card{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.profile-row{
  background:#f8fafc;
  border:1px solid #dbe3ef;
  border-radius:14px;
  padding:14px;
}

.profile-row.full{
  grid-column:1/-1;
}

.profile-row b{
  display:block;
  color:#64748b;
  font-size:13px;
  margin-bottom:6px;
  font-weight:700;
}

.profile-row span{
  font-size:15px;
  font-weight:700;
  color:#1e293b;
}

.checks{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:9px;
}

.checks label{
  display:flex;
  align-items:center;
  gap:9px;
  min-height:46px;
  margin:0;
  padding:10px 12px;
  border:1px solid #dbe3ef;
  border-radius:12px;
  background:#f8fafc;
  font-weight:600;
  cursor:pointer;
}

.checks input{
  width:18px;
  height:18px;
  min-height:18px;
  padding:0;
  accent-color:var(--blue);
}

.active-row{
  display:flex;
  align-items:center;
  gap:10px;
  min-height:52px;
  padding:12px 14px;
  background:#f0fdf4;
  border:1px solid #86efac;
  border-radius:13px;
  color:#166534;
  font-weight:700;
}

.active-row input{
  width:20px;
  height:20px;
  min-height:20px;
  accent-color:var(--green);
}

.request{
  border:1px solid #dbe3ef;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
  background:#fff;
}

.request.new{
  border-color:#bfdbfe;
  background:#f8fbff;
}

.request.viewed{
  border-color:#fde68a;
  background:#fffdf7;
}

.request.in_work{
  border-color:#c7d2fe;
  background:#fafaff;
}

.request.done{
  border-color:#bbf7d0;
  background:#f8fffa;
}

.request-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:10px;
}

.request-title{
  font-size:18px;
  font-weight:700;
  color:#1e293b;
}

.request-status{
  padding:8px 13px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
  white-space:nowrap;
}

.request-status.new{
  background:#dbeafe;
  color:#1d4ed8;
}

.request-status.viewed{
  background:#fef3c7;
  color:#b45309;
}

.request-status.in_work{
  background:#ede9fe;
  color:#5b21b6;
}

.request-status.done{
  background:#dcfce7;
  color:#15803d;
}

.request-body{
  display:grid;
  grid-template-columns:1.2fr 1fr 1fr;
  gap:8px;
  margin-bottom:10px;
}

.request-info{
  display:flex;
  gap:8px;
  align-items:flex-start;
  min-height:50px;
  background:rgba(248,250,252,.88);
  border-radius:10px;
  padding:9px 10px;
  font-size:13px;
  line-height:1.18;
  color:#334155;
}

.request-info b{
  display:block;
  color:#64748b;
  font-size:12px;
  margin-bottom:3px;
  font-weight:700;
}

.info-icon{
  flex:0 0 28px;
  width:28px;
  height:28px;
  border-radius:50%;
  background:#eef4ff;
  color:var(--blue);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:14px;
}

.request-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  align-items:end;
}

.wa-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:50px;
  border-radius:12px;
  background:var(--green);
  color:#fff;
  text-decoration:none;
  font-size:16px;
  font-weight:700;
}

.map-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:42px;
  padding:0 14px;
  border-radius:12px;
  background:#334155;
  color:#fff;
  text-decoration:none;
  font-weight:700;
}

.empty{
  border:1px dashed #cbd5e1;
  background:#f8fafc;
  border-radius:16px;
  padding:22px;
  text-align:center;
  color:#64748b;
  font-weight:700;
}

.msg{
  display:none;
  margin-top:12px;
  padding:13px;
  border-radius:12px;
  font-weight:700;
}

.msg.error{
  display:block;
  background:#fee2e2;
  color:#b91c1c;
}

.msg.success{
  display:block;
  background:#dcfce7;
  color:#166534;
}

.logout-wrap{
  margin-top:16px;
}

@media(max-width:900px){
  .form-grid,
  .profile-card,
  .request-body,
  .request-actions{
    grid-template-columns:1fr;
  }

  .checks{
    grid-template-columns:repeat(2,1fr);
  }

  .status-buttons{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:620px){
  .header-inner,
  .hero{
    flex-direction:column;
  }

  .nav{
    width:100%;
  }

  .nav a{
    flex:1;
    text-align:center;
  }

  .hero h1{
    font-size:31px;
  }

  .tabs,
  .checks,
  .status-buttons{
    grid-template-columns:1fr;
  }

  .password-row{
    flex-direction:column;
  }

  .password-row button{
    width:100%;
    min-height:50px;
  }

  .card{
    padding:20px;
  }
}
</style>
</head>

<body>

<header class="header">
  <div class="header-inner">
    <a class="logo" href="https://zpt.kz/">ZPT.KZ</a>

    <div class="nav">
      <a class="nav-main" href="/service-request/">Заявка клиента</a>
      <a class="nav-seller" href="https://zpt-kz-backend.onrender.com/service-request/register/">Регистрация</a>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="card login-card" id="loginBox">

    <div class="hero">
      <div>
        <h1>Вход исполнителя</h1>
        <p>Войдите в кабинет, чтобы получать заявки и управлять профилем.</p>
      </div>
    </div>

    <div class="field">
      <label>WhatsApp</label>
      <input id="phone" placeholder="77071234567">
    </div>

    <div class="field">
      <label>Пароль</label>

      <div class="password-row">
        <input id="pass" type="password">

        <button type="button" onclick="togglePassword()">
          Показать
        </button>
      </div>
    </div>

    <button class="btn btn-blue" onclick="login()">
      Войти
    </button>

    <div id="loginError" class="msg error"></div>

  </div>

  <div id="cabinetBox" style="display:none">

    <div class="card">

      <div class="hero">
        <div>
          <h1>Кабинет исполнителя</h1>
          <p>Управление заявками, профилем и услугами.</p>
        </div>

        <div id="cabinetStatus" class="cabinet-badge active">
          <span></span>
          Активный кабинет
        </div>
      </div>

      <div class="tabs">
        <button id="tabRequests" class="active" onclick="showTab('requests')">
          Заявки
        </button>

        <button id="tabProfile" onclick="showTab('profile')">
          Профиль
        </button>

        <button id="tabEdit" class="danger-tab" onclick="showTab('edit')">
          Редактировать
        </button>
      </div>

      <div class="status-buttons" id="statusFilterBox">

        <button id="filterAll" class="all active" onclick="setStatusFilter('all')">
          Все
        </button>

        <button id="filterNew" class="new" onclick="setStatusFilter('new')">
          Новые
        </button>

        <button id="filterViewed" class="viewed" onclick="setStatusFilter('viewed')">
          Просмотренные
        </button>

        <button id="filterWork" class="work" onclick="setStatusFilter('in_work')">
          В работе
        </button>

        <button id="filterDone" class="done" onclick="setStatusFilter('done')">
          Завершённые
        </button>

      </div>

      <div id="requestsTab"></div>

      <div id="profileTab" style="display:none">
        <div id="profileView">Загрузка профиля...</div>
      </div>

      <div id="editTab" style="display:none">

        <div class="form-grid">

          <div class="field">
            <label>Название</label>
            <input id="editName">
          </div>

          <div class="field">
            <label>Тип</label>
            <select id="editSellerType">
              <option value="sto">СТО</option>
              <option value="detailing">Детейлинг</option>
            </select>
          </div>

          <div class="field">
            <label>Город</label>
            <input id="editCity">
          </div>

          <div class="field">
            <label>Район</label>
            <input id="editDistrict">
          </div>

          <div class="field">
            <label>Адрес</label>
            <input id="editAddress">
          </div>

          <div class="field">
            <label>Ссылка 2GIS</label>
            <input id="editMapLink">
          </div>

          <div class="field full">
            <label>Новый пароль</label>
            <input id="editPassword" type="password" placeholder="Не менять">
          </div>

          <div class="field full">

            <label>Услуги</label>

            <div id="stoServices" class="checks">

              <label><input type="checkbox" class="serviceCheck" value="Диагностика"> Диагностика</label>
              <label><input type="checkbox" class="serviceCheck" value="Двигатель"> Двигатель</label>
              <label><input type="checkbox" class="serviceCheck" value="Ходовая часть"> Ходовая часть</label>
              <label><input type="checkbox" class="serviceCheck" value="Тормозная система"> Тормозная система</label>
              <label><input type="checkbox" class="serviceCheck" value="Рулевое управление"> Рулевое управление</label>
              <label><input type="checkbox" class="serviceCheck" value="КПП / АКПП"> КПП / АКПП</label>
              <label><input type="checkbox" class="serviceCheck" value="Электрика"> Электрика</label>
              <label><input type="checkbox" class="serviceCheck" value="Кондиционер / печка"> Кондиционер / печка</label>
              <label><input type="checkbox" class="serviceCheck" value="Кузовной ремонт"> Кузовной ремонт</label>
              <label><input type="checkbox" class="serviceCheck" value="Сварочные работы"> Сварочные работы</label>
              <label><input type="checkbox" class="serviceCheck" value="Замена масел / ТО"> Замена масел / ТО</label>
              <label><input type="checkbox" class="serviceCheck" value="Выездной мастер"> Выездной мастер</label>
              <label><input type="checkbox" class="serviceCheck" value="Другое"> Другое</label>

            </div>

            <div id="detailingServices" class="checks" style="display:none">

              <label><input type="checkbox" class="serviceCheck" value="Мойка"> Мойка</label>
              <label><input type="checkbox" class="serviceCheck" value="Химчистка салона"> Химчистка салона</label>
              <label><input type="checkbox" class="serviceCheck" value="Полировка кузова"> Полировка кузова</label>
              <label><input type="checkbox" class="serviceCheck" value="Керамика / защитные покрытия"> Керамика / защитные покрытия</label>
              <label><input type="checkbox" class="serviceCheck" value="Антигравийная плёнка"> Антигравийная плёнка</label>
              <label><input type="checkbox" class="serviceCheck" value="Тонировка"> Тонировка</label>
              <label><input type="checkbox" class="serviceCheck" value="Шумоизоляция"> Шумоизоляция</label>
              <label><input type="checkbox" class="serviceCheck" value="Перетяжка салона"> Перетяжка салона</label>
              <label><input type="checkbox" class="serviceCheck" value="Установка аксессуаров"> Установка аксессуаров</label>
              <label><input type="checkbox" class="serviceCheck" value="Автозвук / мультимедиа"> Автозвук / мультимедиа</label>
              <label><input type="checkbox" class="serviceCheck" value="Свет / оптика"> Свет / оптика</label>
              <label><input type="checkbox" class="serviceCheck" value="Внешний тюнинг"> Внешний тюнинг</label>
              <label><input type="checkbox" class="serviceCheck" value="Другое"> Другое</label>

            </div>

          </div>

          <div class="field full">
            <label class="active-row">
              <input type="checkbox" id="editActive">
              Получать заявки
            </label>
          </div>

          <div class="field full">
            <button class="btn btn-green" onclick="saveProfile()">
              Сохранить профиль
            </button>

            <div id="saveMsg" class="msg"></div>
          </div>

        </div>

      </div>

      <div class="logout-wrap">
        <button class="btn btn-gray" onclick="logout()">
          Выйти
        </button>
      </div>

    </div>

  </div>

</div>

<script>
const API = window.location.origin + '/api/service';

let currentProfile = null;
let currentStatusFilter = 'all';

async function login(){

  loginError.innerText = '';
  loginError.style.display = 'none';

  let whatsapp =
    phone.value.replace(/\D/g,'');

  let password =
    pass.value;

  if(!whatsapp || !password){

    loginError.style.display = 'block';
    loginError.innerText =
      'Введите WhatsApp и пароль';

    return;
  }

  try{

    let r = await fetch(
      API + '/service-seller-login/',
      {
        method:'POST',
        headers:{
          'Content-Type':'application/json'
        },
        body:JSON.stringify({
          whatsapp,
          password
        })
      }
    );

    let data =
      await r.json();

    if(data.error){

      loginError.style.display = 'block';
      loginError.innerText =
        data.error;

      return;
    }

    localStorage.setItem(
      'seller_id',
      data.seller_id
    );

    openCabinet();

  }catch(err){

    loginError.style.display = 'block';
    loginError.innerText =
      'Ошибка подключения';
  }
}

function openCabinet(){

  loginBox.style.display = 'none';
  cabinetBox.style.display = 'block';

  loadProfile();
  loadRequests();
}

async function loadProfile(){

  let seller_id =
    localStorage.getItem('seller_id');

  if(!seller_id) return;

  let r = await fetch(
    API + '/service-seller-profile/?seller_id=' +
    seller_id
  );

  let data =
    await r.json();

  if(data.error){

    profileView.innerHTML =
      `<div class="empty">${data.error}</div>`;

    return;
  }

  currentProfile = data;

  renderProfile(data);
  fillEditForm(data);
  renderCabinetStatus(data);
}

function renderCabinetStatus(p){

  if(p.is_active){

    cabinetStatus.className =
      'cabinet-badge active';

    cabinetStatus.innerHTML =
      '<span></span> Активный кабинет';

  }else{

    cabinetStatus.className =
      'cabinet-badge inactive';

    cabinetStatus.innerHTML =
      '<span></span> Кабинет отключён';
  }
}

function renderProfile(p){

  let type =
    p.seller_type === 'sto'
      ? 'СТО'
      : 'Детейлинг';

  let services =
    p.services && p.services.length
      ? p.services.join(', ')
      : 'Не выбраны';

  profileView.innerHTML = `
    <div class="profile-card">

      <div class="profile-row">
        <b>Название</b>
        <span>${p.name || '-'}</span>
      </div>

      <div class="profile-row">
        <b>WhatsApp</b>
        <span>${p.whatsapp || '-'}</span>
      </div>

      <div class="profile-row">
        <b>Тип</b>
        <span>${type}</span>
      </div>

      <div class="profile-row">
        <b>Город</b>
        <span>${p.city || '-'}</span>
      </div>

      <div class="profile-row">
        <b>Район</b>
        <span>${p.district || '-'}</span>
      </div>

      <div class="profile-row">
        <b>Адрес</b>
        <span>${p.address || '-'}</span>
      </div>

      <div class="profile-row full">
        <b>Услуги</b>
        <span>${services}</span>
      </div>

      <div class="profile-row">
        <b>Статус</b>
        <span>${p.is_active ? 'Получает заявки' : 'Отключен'}</span>
      </div>

      <div class="profile-row">
        <b>2GIS</b>
        ${
          p.map_link
            ? `<a class="map-btn" href="${p.map_link}" target="_blank">Открыть карту</a>`
            : `<span>Не указано</span>`
        }
      </div>

    </div>
  `;
}

function fillEditForm(p){

  editName.value =
    p.name || '';

  editSellerType.value =
    p.seller_type || 'sto';

  toggleServiceBlocks(false);

  editCity.value =
    p.city || '';

  editDistrict.value =
    p.district || '';

  editAddress.value =
    p.address || '';

  editMapLink.value =
    p.map_link || '';

  editPassword.value =
    '';

  editActive.checked =
    !!p.is_active;

  document
    .querySelectorAll('.serviceCheck')
    .forEach(ch => {

      ch.checked =
        (p.services || [])
          .includes(ch.value);

    });
}

async function saveProfile(){

  saveMsg.style.display = 'none';
  saveMsg.className = 'msg';

  let seller_id =
    localStorage.getItem('seller_id');

  let services = Array
    .from(
      document.querySelectorAll(
        '.serviceCheck:checked'
      )
    )
    .map(x => x.value);

  let payload = {
    seller_id,
    name:editName.value.trim(),
    seller_type:editSellerType.value,
    city:editCity.value.trim(),
    district:editDistrict.value.trim(),
    address:editAddress.value.trim(),
    map_link:editMapLink.value.trim(),
    password:editPassword.value.trim(),
    is_active:editActive.checked,
    services
  };

  try{

    let r = await fetch(
      API + '/update-service-seller-profile/',
      {
        method:'POST',
        headers:{
          'Content-Type':'application/json'
        },
        body:JSON.stringify(payload)
      }
    );

    let data =
      await r.json();

    if(data.error){

      saveMsg.className =
        'msg error';

      saveMsg.innerText =
        data.error;

      return;
    }

    saveMsg.className =
      'msg success';

    saveMsg.innerText =
      'Профиль сохранён';

    await loadProfile();

    showTab('profile');

  }catch(err){

    saveMsg.className =
      'msg error';

    saveMsg.innerText =
      'Ошибка сохранения';
  }
}

async function loadRequests(){

  let seller_id =
    localStorage.getItem('seller_id');

  if(!seller_id) return;

  let r = await fetch(
    API + '/get-requests/?seller_id=' +
    seller_id
  );

  let data =
    await r.json();

  let filter =
    currentStatusFilter;

  let container =
    document.getElementById('requestsTab');

  container.innerHTML = '';

  if(!data.requests || !data.requests.length){

    container.innerHTML =
      '<div class="empty">Пока заявок нет</div>';

    return;
  }

  let shown = 0;

  data.requests.forEach(req => {

    if(filter !== 'all' && req.status !== filter){
      return;
    }

    shown += 1;

    let status =
      req.status || 'new';

    let statusText = {
      new:'Новая',
      viewed:'Просмотрена',
      in_work:'В работе',
      done:'Завершена'
    }[status] || 'Новая';

    let services =
      Array.isArray(req.services)
        ? req.services.join(', ')
        : '-';

    let wa =
      `https://wa.me/${req.phone}?text=` +
      encodeURIComponent(
        `Здравствуйте. По заявке ZPT:\n` +
        `Услуги: ${services}\n` +
        `Город: ${req.city || ''}\n` +
        `Описание: ${req.description || ''}`
      );

    container.innerHTML += `
      <div class="request ${status}">

        <div class="request-top">

          <div class="request-title">
            ${req.service_type === 'sto' ? 'СТО заявка' : 'Детейлинг заявка'}
          </div>

          <div class="request-status ${status}">
            ${statusText}
          </div>

        </div>

        <div class="request-body">

          <div class="request-info">
            <div class="info-icon">↗</div>
            <div>
              <b>Услуги</b>
              ${services}
            </div>
          </div>

          <div class="request-info">
            <div class="info-icon">⌂</div>
            <div>
              <b>Город</b>
              ${req.city || '-'}
            </div>
          </div>

          <div class="request-info">
            <div class="info-icon">☎</div>
            <div>
              <b>Телефон</b>
              ${req.phone || '-'}
            </div>
          </div>

          <div class="request-info">
            <div class="info-icon">⌖</div>
            <div>
              <b>Район</b>
              ${req.district || '-'}
            </div>
          </div>

          <div class="request-info">
            <div class="info-icon">☰</div>
            <div>
              <b>Комментарий</b>
              ${req.description || '-'}
            </div>
          </div>

        </div>

        <div class="request-actions">

          <div>
            <label>Статус</label>

            <select onchange="updateStatus(${req.id}, this.value)">
              <option value="new" ${status === 'new' ? 'selected' : ''}>Новая</option>
              <option value="viewed" ${status === 'viewed' ? 'selected' : ''}>Просмотрена</option>
              <option value="in_work" ${status === 'in_work' ? 'selected' : ''}>В работе</option>
              <option value="done" ${status === 'done' ? 'selected' : ''}>Завершена</option>
            </select>
          </div>

          <a href="${wa}" target="_blank" class="wa-btn">
            Написать в WhatsApp
          </a>

        </div>

      </div>
    `;
  });

  if(shown === 0){

    container.innerHTML =
      '<div class="empty">По выбранному статусу заявок нет</div>';
  }
}

async function updateStatus(request_id,status){

  let seller_id =
    localStorage.getItem('seller_id');

  try{

    await fetch(
      API + '/update-match-status/',
      {
        method:'POST',
        headers:{
          'Content-Type':'application/json'
        },
        body:JSON.stringify({
          seller_id,
          request_id,
          status
        })
      }
    );

    loadRequests();

  }catch(err){

    alert('Ошибка обновления статуса');
  }
}

function setStatusFilter(status){

  currentStatusFilter =
    status;

  document
    .querySelectorAll('.status-buttons button')
    .forEach(btn => btn.classList.remove('active'));

  if(status === 'all') filterAll.classList.add('active');
  if(status === 'new') filterNew.classList.add('active');
  if(status === 'viewed') filterViewed.classList.add('active');
  if(status === 'in_work') filterWork.classList.add('active');
  if(status === 'done') filterDone.classList.add('active');

  loadRequests();
}

function showTab(tab){

  tabRequests.classList.remove('active');
  tabProfile.classList.remove('active');
  tabEdit.classList.remove('active');

  requestsTab.style.display = 'none';
  profileTab.style.display = 'none';
  editTab.style.display = 'none';
  statusFilterBox.style.display = 'none';

  if(tab === 'requests'){

    tabRequests.classList.add('active');
    statusFilterBox.style.display = 'grid';
    requestsTab.style.display = 'block';
  }

  if(tab === 'profile'){

    tabProfile.classList.add('active');
    profileTab.style.display = 'block';
  }

  if(tab === 'edit'){

    tabEdit.classList.add('active');
    editTab.style.display = 'block';
  }
}

function logout(){

  localStorage.removeItem('seller_id');
  location.reload();
}

const editSellerType =
  document.getElementById('editSellerType');

const stoServices =
  document.getElementById('stoServices');

const detailingServices =
  document.getElementById('detailingServices');

function toggleServiceBlocks(clearHidden = true){

  if(editSellerType.value === 'detailing'){

    if(clearHidden){

      stoServices
        .querySelectorAll('input[type="checkbox"]')
        .forEach(ch => ch.checked = false);
    }

    stoServices.style.display =
      'none';

    detailingServices.style.display =
      'grid';

  }else{

    if(clearHidden){

      detailingServices
        .querySelectorAll('input[type="checkbox"]')
        .forEach(ch => ch.checked = false);
    }

    stoServices.style.display =
      'grid';

    detailingServices.style.display =
      'none';
  }
}

editSellerType.addEventListener(
  'change',
  () => toggleServiceBlocks(true)
);

window.onload = function(){

  let seller_id =
    localStorage.getItem('seller_id');

  if(seller_id){
    openCabinet();
  }
}

function togglePassword(){

  const input =
    document.getElementById('pass');

  input.type =
    input.type === 'password'
      ? 'text'
      : 'password';
}
</script>
