<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Кабинет продавца — Market Parts</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#f3f4f6}
.page{max-width:1180px;margin:0 auto;padding:20px}

.topbar{display:flex;justify-content:space-between;margin-bottom:20px}
.brand{font-weight:800;color:#e21d25;font-size:22px}
.nav a,.nav button{margin-left:10px;padding:10px 16px;border-radius:10px;border:0;color:#fff;font-weight:700}
.home{background:#2f7df6}
.cabinet{background:#24c770}
.logout{background:#e21d25}

.hero,.panel{background:#fff;border-radius:14px;padding:20px;margin-bottom:16px}

.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.tab{padding:12px;border-radius:10px;border:0;font-weight:700;background:#eaf1ff}
.tab.active{background:#2f7df6;color:#fff}
.tab.exit{background:#ffe8e8;color:#e21d25}

.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.summary-card{border:1px solid #e3e9f1;padding:14px;border-radius:10px}
.summary-card b{font-size:26px}

.filters{display:flex;flex-wrap:wrap;gap:10px}
.pill{padding:10px 14px;border-radius:10px;border:1px solid #ddd;background:#fff;cursor:pointer}
.pill.active{background:#e21d25;color:#fff}
.pill.blue.active{background:#2f7df6}

.request-card{background:#fff;border-radius:14px;padding:16px;margin-top:12px}
.badge{padding:5px 10px;border-radius:999px;font-size:12px}
.badge-new{background:#e7f8e9}
.badge-contacted{background:#eaf1ff}
.badge-done{background:#ffe8e8}

.actions{margin-top:10px;display:flex;gap:10px}
.btn{padding:10px 14px;border-radius:10px;border:0;font-weight:700}
.btn-green{background:#22d36c;color:#fff}
.btn-blue{background:#1769d8;color:#fff}
.btn-red{background:#d92027;color:#fff}

.profile-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:12px;
}

.info-box{
  background:#f9fbff;
  border:1px solid #e3e9f1;
  border-radius:10px;
  padding:12px;
}

.info-box b{
  display:block;
  font-size:12px;
  color:#666;
  margin-bottom:3px;
}

.info-box div{
  font-weight:700;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="page">

<div class="topbar">
  <div class="brand">Market Parts</div>
  <div class="nav">
    <a class="home">Главная</a>
    <a class="cabinet">Кабинет</a>
    <button class="logout" onclick="sellerLogout()">Выход</button>
  </div>
</div>

<div id="cabinetApp">

<div class="hero">
  <h1 id="pageTitle">Кабинет продавца</h1>
  <p id="pageSubtitle">Заявки покупателей</p>
</div>

<div class="tabs">
  <button id="tabRequests" class="tab active" onclick="showTab('requests')">Заявки</button>
  <button id="tabProfile" class="tab" onclick="showTab('profile')">Мой профиль</button>
  <button class="tab exit" onclick="sellerLogout()">Выход</button>
</div>

<!-- ЗАЯВКИ -->
<div id="requestsTab">

<div class="panel">
  <div class="summary">
    <div class="summary-card"><span>Новые</span><b id="countNew">0</b></div>
    <div class="summary-card"><span>Всего</span><b id="countAll">0</b></div>
    <div class="summary-card"><span>Период</span><b id="countPeriod">0</b></div>
  </div>
</div>

<div class="panel">
  <div class="filters">
    <button class="pill active" onclick="setPeriod('all')">Все</button>
    <button class="pill" onclick="setPeriod('today')">Сегодня</button>
    <button class="pill" onclick="setPeriod('7d')">7 дней</button>
  </div>
</div>

<div id="requestsContent"></div>

</div>

<!-- ПРОФИЛЬ -->
<div id="profileTab" class="hidden">

<div class="panel">
  <div style="display:flex;justify-content:space-between">
    <h2>Мой профиль</h2>
    <button class="btn btn-red">Редактировать</button>
  </div>
</div>

<div class="panel">
  <h3>Данные магазина</h3>
  <div id="profileBox" class="profile-grid"></div>
</div>

<div class="panel">
  <h3>Настройки</h3>
  <div id="settingsBox" class="profile-grid"></div>
</div>

</div>

</div>
</div>

<script>
function showTab(tab){
  requestsTab.classList.toggle('hidden',tab!=='requests');
  profileTab.classList.toggle('hidden',tab!=='profile');
}
</script>

</body>
</html>
