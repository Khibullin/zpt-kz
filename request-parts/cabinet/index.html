<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Кабинет продавца</title>

<link rel="icon" href="/static/favicon/favicon.ico" sizes="any">

<style>
body{font-family:Arial;background:#f4f5f7;margin:0;color:#222}

.back-link{
  display:inline-block;
  margin:16px;
  text-decoration:none;
  font-weight:bold;
  color:#3478f6;
}

.wrap{max-width:1100px;margin:auto;padding:20px}
.card{background:#fff;border-radius:20px;padding:22px;margin-bottom:18px;box-shadow:0 8px 24px rgba(0,0,0,.06)}
h1{margin:0;color:#d62828}

.btn{border:none;padding:11px 18px;border-radius:12px;font-weight:bold;cursor:pointer;margin-top:10px}
.blue{background:#3478f6;color:#fff}

.error{color:#ed1c24;font-weight:bold;margin-top:12px}

.login-help{
  margin-top:18px;
  padding:14px;
  background:#f5f7fb;
  border-radius:12px;
  font-size:14px;
  color:#444;
}

.help-btn{
  display:inline-block;
  margin-top:8px;
  background:#25D366;
  color:#fff;
  padding:10px 14px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<a href="/" class="back-link">← На главную</a>

<div class="wrap">

  <div class="card" id="loginBox">

    <h1>Вход продавца</h1>

    <label>WhatsApp</label>
    <input id="login_whatsapp" placeholder="8707XXXXXXX">

    <label>Пароль</label>
    <input id="login_password" type="password">

    <label style="font-weight:normal">
      <input type="checkbox" style="width:auto" onclick="login_password.type=this.checked?'text':'password'">
      Показать пароль
    </label>

    <button class="btn blue" onclick="sellerLogin()">Войти</button>

    <div id="loginError" class="error"></div>

    <!-- 🔥 Новый блок помощи -->
    <div class="login-help">
      <p><b>Нет доступа в кабинет?</b></p>
      <p>Напишите администратору в WhatsApp — поможем восстановить доступ.</p>
      <a href="https://wa.me/77713607040" target="_blank" class="help-btn">
        Написать администратору
      </a>
    </div>

  </div>

</div>

<script>
const API='https://zpt-kz-backend.onrender.com/api';

async function sellerLogin(){
  loginError.innerText='';

  let whatsapp=login_whatsapp.value.trim();
  let password=login_password.value;

  let r=await fetch(`${API}/seller-login/`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({whatsapp,password})
  });

  let data=await r.json();

  if(data.error){
    loginError.innerText=data.error;
    return;
  }

  window.location.href='/request-parts/cabinet/';
}
</script>

</body>
</html>
