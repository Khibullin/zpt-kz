<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Кабинет продавца</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
.wrap{max-width:980px;margin:auto;padding:20px}
h1{color:#d62828}

.filter button,.statusfilter button{
margin-right:6px;
margin-bottom:8px;
padding:8px 12px;
border-radius:8px;
border:1px solid #ddd;
cursor:pointer;
background:white;
}

.active{background:#d62828!important;color:white!important}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin:16px 0;
}

.stat{
background:#fff;
border-radius:12px;
padding:14px;
box-shadow:0 3px 10px rgba(0,0,0,.05);
font-weight:bold;
}

.stat span{
display:block;
font-size:26px;
margin-top:6px;
color:#d62828;
}

.card{
background:#fff;
padding:16px;
border-radius:12px;
margin-bottom:14px;
box-shadow:0 3px 10px rgba(0,0,0,.05);
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;
margin-bottom:10px;
}

.prepared{background:#e8f5e9;color:#0d5d22}
.viewed{background:#e3f2fd;color:#0d47a1}
.contacted{background:#fff3cd;color:#8a5a00}
.rejected{background:#ffebee;color:#b71c1c}

.btn{
display:inline-block;
padding:9px 12px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
margin-right:8px;
margin-top:8px;
border:none;
cursor:pointer;
}

.wa{background:#25D366;color:#fff}
.ok{background:#1565c0;color:#fff}
.no{background:#c62828;color:#fff}

small{color:#666}

@media(max-width:700px){
.stats{grid-template-columns:1fr 1fr}
}
</style>
</head>

<body>

<div class="wrap">

<h1>Кабинет продавца</h1>

<div class="filter">
Период:
<button id="period-today" onclick="setPeriod('today')">Сегодня</button>
<button id="period-7d" class="active" onclick="setPeriod('7d')">7 дней</button>
<button id="period-30d" onclick="setPeriod('30d')">30 дней</button>
<button id="period-all" onclick="setPeriod('all')">Все</button>
</div>

<div class="statusfilter">
Статус:
<button id="status-all" class="active" onclick="setStatusFilter('all')">Все</button>
<button id="status-prepared" onclick="setStatusFilter('prepared')">Новые</button>
<button id="status-contacted" onclick="setStatusFilter('contacted')">Связался</button>
<button id="status-rejected" onclick="setStatusFilter('rejected')">Отказ</button>
</div>

<div class="stats">
<div class="stat">Всего<span id="stat-total">0</span></div>
<div class="stat">Новые<span id="stat-new">0</span></div>
<div class="stat">Связался<span id="stat-contacted">0</span></div>
<div class="stat">Отказ<span id="stat-rejected">0</span></div>
</div>

<div id="list"></div>

</div>

<script>
const API='https://zpt-kz-backend.onrender.com/api';

let currentStatus='all';
let currentPeriod='7d';
let allRows=[];

function getSellerId(){
 const url=new URL(window.location.href);
 return url.searchParams.get('seller_id') || 2;
}

function label(s){
 if(s==='prepared') return 'Новая';
 if(s==='viewed') return 'Просмотрена';
 if(s==='contacted') return 'Связался';
 if(s==='rejected') return 'Отказ';
 return s || 'Новая';
}

function normalizePhone(phone){
 let digits=String(phone || '').replace(/\D/g,'');
 if(digits.length===11 && digits.startsWith('8')) digits='7'+digits.slice(1);
 return digits;
}

function buildWA(phone,req){
 const cleanPhone=normalizePhone(phone);

 const text=encodeURIComponent(
`Здравствуйте! Пишу по заявке №${req.id}

${req.brand} ${req.model}
Категория: ${req.category}
Город: ${req.city}

${req.description || ''}

Есть ли в наличии?`
);

 return `https://wa.me/${cleanPhone}?text=${text}`;
}

function setActiveButtons(){
 document.querySelectorAll('.filter button').forEach(b=>b.classList.remove('active'));
 document.querySelectorAll('.statusfilter button').forEach(b=>b.classList.remove('active'));

 const periodBtn=document.getElementById(`period-${currentPeriod}`);
 const statusBtn=document.getElementById(`status-${currentStatus}`);

 if(periodBtn) periodBtn.classList.add('active');
 if(statusBtn) statusBtn.classList.add('active');
}

function setPeriod(period){
 currentPeriod=period;
 setActiveButtons();
 loadData();
}

function setStatusFilter(status){
 currentStatus=status;
 setActiveButtons();
 renderList();
}

async function changeStatus(match_id,status,shouldReload=true){
 await fetch(`${API}/update-match-status/`,{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({
      match_id:match_id,
      status:status
   })
 });

 const item=allRows.find(x=>x.match_id===match_id);
 if(item) item.match_status=status;

 if(shouldReload){
   renderList();
 }
}

async function contactClient(match_id,waLink){
 await changeStatus(match_id,'contacted',false);
 window.open(waLink,'_blank');
 renderList();
}

function updateStats(){
 const total=allRows.length;
 const prepared=allRows.filter(x=>x.match_status==='prepared').length;
 const contacted=allRows.filter(x=>x.match_status==='contacted').length;
 const rejected=allRows.filter(x=>x.match_status==='rejected').length;

 document.getElementById('stat-total').textContent=total;
 document.getElementById('stat-new').textContent=prepared;
 document.getElementById('stat-contacted').textContent=contacted;
 document.getElementById('stat-rejected').textContent=rejected;
}

function renderList(){
 updateStats();

 let rows=allRows;

 if(currentStatus!=='all'){
   rows=rows.filter(x=>x.match_status===currentStatus);
 }

 const list=document.getElementById('list');
 list.innerHTML='';

 if(rows.length===0){
   list.innerHTML='<div class="card">Заявок по выбранному фильтру нет.</div>';
   return;
 }

 rows.forEach(r=>{
   const wa=buildWA(r.phone,r);

   list.innerHTML += `
   <div class="card">
     <div class="badge ${r.match_status}">
       ${label(r.match_status)}
     </div>

     <b>Заявка №${r.id}</b><br>
     <small>${r.created_at}</small>

     <br><br>

     ${r.city || '-'} • ${r.brand || '-'} ${r.model || ''}<br>
     Категория: ${r.category || '-'}<br>
     ${r.article ? 'Артикул: '+r.article+'<br>' : ''}

     <br>
     ${r.description || ''}

     <br><br>

     <button class="btn wa" onclick="contactClient(${r.match_id}, '${wa}')">
       Написать клиенту
     </button>

     <button class="btn ok" onclick="changeStatus(${r.match_id},'contacted')">
       Связался
     </button>

     <button class="btn no" onclick="changeStatus(${r.match_id},'rejected')">
       Отказ
     </button>
   </div>
   `;
 });
}

async function loadData(){
 const seller_id=getSellerId();

 const res=await fetch(
   `${API}/seller-requests/?seller_id=${seller_id}&period=${currentPeriod}`
 );

 const data=await res.json();
 allRows=Array.isArray(data.requests) ? data.requests : [];

 renderList();
}

setActiveButtons();
loadData();
</script>

</body>
</html>
