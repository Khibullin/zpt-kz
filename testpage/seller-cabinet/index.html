<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Кабинет продавца</title>

<link rel="icon" href="/static/favicon/favicon.ico">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;color:#222}
.wrap{max-width:1100px;margin:auto;padding:20px}
.card{background:#fff;border-radius:18px;padding:22px;margin-bottom:18px;box-shadow:0 4px 12px rgba(0,0,0,.05)}
h1{margin-top:0;color:#d62828}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.tab{border:none;padding:14px;border-radius:12px;font-weight:bold;cursor:pointer;background:#e9eef8;color:#3478f6}
.tab.active{background:#3478f6;color:#fff}
.section{display:none}.section.active{display:block}
.btn{border:none;padding:10px 16px;border-radius:10px;font-weight:bold;cursor:pointer;margin-top:10px;margin-right:6px}
.blue{background:#3478f6;color:#fff}
.green{background:#25D366;color:#fff}
.gray{background:#757575;color:#fff}
.metric{border:1px solid #dde3ef;border-radius:14px;padding:16px}
.metric b{display:block;font-size:32px;margin-top:6px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.ticket{border:1px solid #e6e6e6;border-radius:14px;padding:16px;margin-top:14px;background:#fafafa}
.ticket-header{display:flex;justify-content:space-between;align-items:center}
.badge{padding:6px 10px;border-radius:20px;font-size:12px;font-weight:bold;background:#eef5ff}
.detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #ddd}
.periods{display:flex;gap:10px;margin-top:10px}
.periods button{border:none;padding:8px 14px;border-radius:10px;cursor:pointer;background:#e9eef8}
.periods button.active{background:#3478f6;color:#fff}
</style>
</head>

<body>

<div class="wrap">

<div class="card">
<h1>Кабинет продавца</h1>
<div id="sellerSummary"></div>
<button class="btn gray" onclick="logout()">Выйти</button>
</div>

<div class="card">
<div class="tabs">
<button class="tab active" onclick="openTab('requests')">Заявки</button>
<button class="tab" onclick="openTab('profile')">Профиль</button>
</div>
</div>

<div id="requests" class="section active">

<div class="card">
<h2>Сводка</h2>
<div class="grid3">
<div class="metric">Новых<b id="newCount">0</b></div>
<div class="metric">Всего<b id="allCount">0</b></div>
<div class="metric">За период<b id="periodCount">0</b></div>
</div>

<div class="periods">
<button onclick="setPeriod('all')" id="p_all">Все</button>
<button onclick="setPeriod('today')" id="p_today">Сегодня</button>
<button onclick="setPeriod('7d')" id="p_7d">7 дней</button>
<button onclick="setPeriod('30d')" id="p_30d">30 дней</button>
</div>
</div>

<div class="card">
<h2>Заявки покупателей</h2>
<div id="list"></div>
</div>

</div>

<div id="profile" class="section">
<div class="card">
<h2>Профиль</h2>
<div id="profileData"></div>
</div>
</div>

</div>

<script>
const API='https://zpt-kz-backend.onrender.com/api';
let requests=[];
let currentPeriod='all';

function openTab(t){
document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
document.getElementById(t).classList.add('active');
}

async function loadProfile(){
let r=await fetch(API+'/seller-profile/',{credentials:'include'});
let d=await r.json();

sellerSummary.innerHTML=`<b>${d.name}</b><br>${d.whatsapp}`;
profileData.innerHTML=`Тип: ${d.transport_type=='truck'?'Грузовые':'Легковые'}`;
}

async function loadRequests(){
let r=await fetch(API+`/seller-requests/?period=${currentPeriod}`,{credentials:'include'});
let d=await r.json();
requests=d.requests||[];
render();
}

function setPeriod(p){
currentPeriod=p;

document.querySelectorAll('.periods button').forEach(x=>x.classList.remove('active'));
document.getElementById('p_'+p).classList.add('active');

loadRequests();
}

function render(){

allCount.innerText=requests.length;
periodCount.innerText=requests.length;
newCount.innerText=requests.filter(x=>x.match_status=='Новая').length;

let html='';

requests.forEach(r=>{

html+=`
<div class="ticket">

<div class="ticket-header">
<b>Заявка №${r.id}</b>
<span class="badge">${r.match_status}</span>
</div>

<div>${r.city||''} • ${r.brand||''} ${r.model||''}</div>

<button class="btn gray" onclick="toggle(${r.id})">Открыть</button>

<div class="detail" id="d${r.id}">

<div><b>Категория:</b> ${r.category||''}</div>
<div><b>Описание:</b> ${r.description||'-'}</div>
<div><b>Дата:</b> ${r.created_at||''}</div>
<div><b>Телефон:</b> ${r.phone||''}</div>

<a class="btn green" href="https://wa.me/${r.phone}" target="_blank">WhatsApp</a>
<button class="btn blue" onclick="contacted(${r.match_id})">Связался</button>

</div>

</div>
`;

});

list.innerHTML=html||'Нет заявок';
}

function toggle(id){
let el=document.getElementById('d'+id);
el.style.display=el.style.display=='block'?'none':'block';
}

async function contacted(id){
await fetch(API+'/update-match-status/',{
method:'POST',
credentials:'include',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({match_id:id,status:'contacted'})
});
loadRequests();
}

function logout(){
fetch(API+'/seller-logout/',{method:'POST',credentials:'include'});
location.reload();
}

loadProfile();
setPeriod('all');
</script>

</body>
</html>
