<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Кабинет продавца</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
.wrap{max-width:980px;margin:auto;padding:20px}
h1{color:#d62828}

.filter button,.statusfilter button{
margin-right:6px;
margin-bottom:8px;
padding:8px 12px;
border-radius:8px;
border:1px solid #ddd;
cursor:pointer;
background:white;
}
.active{background:#d62828!important;color:#fff!important}

.stats{
display:grid;
grid-template-columns:repeat(5,minmax(0,1fr));
gap:10px;
margin:16px 0;
}

.stat{
background:#fff;
padding:14px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.05);
font-weight:bold;
}
.stat span{
display:block;
font-size:26px;
margin-top:5px;
color:#d62828;
}

.ticket{
background:#fff;
border-radius:14px;
padding:16px;
margin-bottom:12px;
box-shadow:0 3px 10px rgba(0,0,0,.05);
}

.ticket.archived{
opacity:.86;
background:#f2f2f2;
}

.ticket-head{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.ticket-title{
font-weight:bold;
font-size:20px;
}

.ticket-line{margin-top:6px}

.ticket-detail{
display:none;
border-top:1px solid #eee;
margin-top:14px;
padding-top:14px;
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.prepared{background:#e8f5e9}
.contacted{background:#e3f2fd}
.rejected{background:#ffebee}
.archived{background:#eeeeee}

.btn{
display:inline-block;
padding:9px 12px;
border-radius:8px;
font-weight:bold;
text-decoration:none;
border:none;
cursor:pointer;
margin-right:8px;
margin-top:8px;
}

.openbtn{background:#efefef}
.wa{background:#25D366;color:#fff}
.ok{background:#1565c0;color:#fff}
.archive{background:#757575;color:#fff}
.restore{background:#546e7a;color:#fff}
.no{background:#c62828;color:#fff}

small{color:#666}

@media(max-width:700px){
.stats{
grid-template-columns:1fr 1fr;
}
}
</style>
</head>
<body>

<div class="wrap">

<h1>Кабинет продавца</h1>

<div class="filter">
Период:
<button id="period-today" onclick="setPeriod('today')">Сегодня</button>
<button id="period-7d" class="active" onclick="setPeriod('7d')">7 дней</button>
<button id="period-30d" onclick="setPeriod('30d')">30 дней</button>
<button id="period-all" onclick="setPeriod('all')">Все</button>
</div>

<div class="statusfilter">
Статус:
<button id="status-all" class="active" onclick="setStatusFilter('all')">Все</button>
<button id="status-prepared" onclick="setStatusFilter('prepared')">Новые</button>
<button id="status-contacted" onclick="setStatusFilter('contacted')">Связался</button>
<button id="status-archived" onclick="setStatusFilter('archived')">Архив</button>
<button id="status-rejected" onclick="setStatusFilter('rejected')">Отказ</button>
</div>

<div class="stats">
<div class="stat">Всего<span id="stat-total">0</span></div>
<div class="stat">Новые<span id="stat-new">0</span></div>
<div class="stat">Связался<span id="stat-contacted">0</span></div>
<div class="stat">Архив<span id="stat-archived">0</span></div>
<div class="stat">Отказ<span id="stat-rejected">0</span></div>
</div>

<div id="list"></div>

</div>

<script>
const API='https://zpt-kz-backend.onrender.com/api';

let currentStatus='all';
let currentPeriod='7d';
let allRows=[];

function getSellerId(){
 const url=new URL(window.location.href);
 return url.searchParams.get('seller_id') || 2;
}

function label(s){
 if(s==='prepared') return 'Новая';
 if(s==='contacted') return 'Связался';
 if(s==='rejected') return 'Отказ';
 if(s==='archived') return 'Архив';
 return 'Новая';
}

function phoneDigits(phone){
 let d=String(phone||'').replace(/\D/g,'');
 if(d.startsWith('8')) d='7'+d.slice(1);
 return d;
}

function buildWA(phone,req){
 const text=encodeURIComponent(
`Здравствуйте! Пишу по заявке №${req.id}

${req.brand} ${req.model}
${req.description || ''}

Есть ли в наличии?`
 );
 return `https://wa.me/${phoneDigits(phone)}?text=${text}`;
}

function setPeriod(p){
 currentPeriod=p;
 loadData();
}

function setStatusFilter(s){
 currentStatus=s;
 render();
}

async function changeStatus(match_id,status){

 await fetch(
 `${API}/update-match-status/`,
 {
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    match_id,
    status
  })
 });

 let item=allRows.find(
   x=>x.match_id===match_id
 );

 if(item){
   item.match_status=status;
 }

 render();
}

async function contactClient(match_id,wa){
 await changeStatus(
   match_id,
   'contacted'
 );
 window.open(wa,'_blank');
}

function toggleDetail(id){
 const el=document.getElementById(
   'detail-'+id
 );
 el.style.display=
  el.style.display==='block'
  ? 'none'
  : 'block';
}

function updateStats(){

document.getElementById(
'stat-total'
).textContent=
allRows.length;

document.getElementById(
'stat-new'
).textContent=
allRows.filter(
x=>x.match_status==='prepared'
).length;

document.getElementById(
'stat-contacted'
).textContent=
allRows.filter(
x=>x.match_status==='contacted'
).length;

document.getElementById(
'stat-archived'
).textContent=
allRows.filter(
x=>x.match_status==='archived'
).length;

document.getElementById(
'stat-rejected'
).textContent=
allRows.filter(
x=>x.match_status==='rejected'
).length;

}

function render(){

 updateStats();

 let rows=allRows;

 if(currentStatus!=='all'){
   rows=rows.filter(
    x=>x.match_status===currentStatus
   );
 }

 const list=document.getElementById('list');
 list.innerHTML='';

 rows.forEach(r=>{

 const wa=buildWA(r.phone,r);

 const archivedClass=
 r.match_status==='archived'
 ? 'archived'
 : '';

 let actions='';

 if(r.match_status==='archived'){

 actions=`
<button
class="btn restore"
onclick="changeStatus(${r.match_id},'prepared')">
Восстановить
</button>
`;

 } else {

 actions=`

<button
class="btn wa"
onclick="contactClient(${r.match_id},'${wa}')">
Написать клиенту
</button>

<button
class="btn ok"
onclick="changeStatus(${r.match_id},'contacted')">
Связался
</button>

<button
class="btn archive"
onclick="changeStatus(${r.match_id},'archived')">
В архив
</button>

<button
class="btn no"
onclick="changeStatus(${r.match_id},'rejected')">
Отказ
</button>

`;
 }

 list.innerHTML+=`
<div class="ticket ${archivedClass}">

<div class="ticket-head">
<div>

<span class="badge ${r.match_status}">
${label(r.match_status)}
</span>

<span class="ticket-title">
Заявка №${r.id}
</span>

<div class="ticket-line">
${r.brand} ${r.model}
•
${r.category}
</div>

<small>${r.created_at}</small>

</div>

<button
class="btn openbtn"
onclick="toggleDetail(${r.id})">
Открыть заявку
</button>

</div>

<div
class="ticket-detail"
id="detail-${r.id}">

Город: ${r.city}<br>
Транспорт: ${r.transport_type}<br>
Страна: ${r.country || '-'}<br>
Марка: ${r.brand}<br>
Модель: ${r.model}<br>
Категория: ${r.category}<br>

${r.article ?
'Артикул: '+r.article+'<br>'
: ''}

Телефон: ${r.phone}<br><br>

${r.description || ''}

<br><br>

${actions}

</div>

</div>
`;
 });

}

async function loadData(){

const seller_id=getSellerId();

const res=await fetch(
`${API}/seller-requests/?seller_id=${seller_id}&period=${currentPeriod}`
);

const data=await res.json();

allRows=data.requests || [];

render();

}

loadData();

</script>

</body>
</html>
