<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Кабинет продавца</title>

<link rel="icon" href="/static/favicon/favicon.ico">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;color:#222}

.wrap{max-width:900px;margin:auto;padding:16px}

.card{background:#fff;border-radius:16px;padding:18px;margin-bottom:16px}

h1{color:#d62828;margin:0 0 10px}

.periods{display:flex;gap:10px;flex-wrap:wrap}
.periods button{
border:none;padding:10px 14px;border-radius:10px;
background:#e9eef8;cursor:pointer;font-weight:bold
}
.periods button.active{background:#3478f6;color:#fff}

.ticket{
background:#fff;
border-radius:16px;
padding:16px;
margin-bottom:14px;
border:2px solid #e74c3c;
}

.ticket-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px
}

.ticket-id{
font-weight:bold;
color:#d62828;
font-size:18px
}

.badge{
background:#eef5ff;
padding:6px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold
}

.ticket-line{
margin:4px 0;
font-size:14px
}

.comment{
background:#f3f3f3;
padding:10px;
border-radius:10px;
margin:10px 0;
font-size:14px
}

.btn{
display:block;
width:100%;
text-align:center;
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

.red{background:#e53935;color:#fff}
.green{background:#25D366;color:#fff}
.blue{background:#3478f6;color:#fff}

.detail{display:none}

</style>
</head>

<body>

<div class="wrap">

<div class="card">
<h1>Кабинет продавца</h1>
<div id="sellerSummary"></div>
</div>

<div class="card">
<div class="periods">
<button id="p_all" onclick="setPeriod('all')">Все</button>
<button id="p_today" onclick="setPeriod('today')">Сегодня</button>
<button id="p_7d" onclick="setPeriod('7d')">7 дней</button>
<button id="p_30d" onclick="setPeriod('30d')">30 дней</button>
</div>
</div>

<div id="list"></div>

</div>

<script>
const API='https://zpt-kz-backend.onrender.com/api';
let requests=[];
let currentPeriod='all';

async function loadProfile(){
let r=await fetch(API+'/seller-profile/',{credentials:'include'});
let d=await r.json();

sellerSummary.innerHTML=`
<b>${d.name}</b><br>
WhatsApp: ${d.whatsapp}<br>
${d.transport_type=='truck'?'Грузовые':'Легковые'}
`;
}

async function loadRequests(){
let r=await fetch(API+`/seller-requests/?period=${currentPeriod}`,{credentials:'include'});
let d=await r.json();
requests=d.requests||[];
render();
}

function setPeriod(p){
currentPeriod=p;

document.querySelectorAll('.periods button').forEach(x=>x.classList.remove('active'));
document.getElementById('p_'+p).classList.add('active');

loadRequests();
}

function render(){

let html='';

requests.forEach(r=>{

html+=`
<div class="ticket">

<div class="ticket-header">
<div class="ticket-id">MP-${r.id}</div>
<div>
<span class="badge">${r.match_status}</span><br>
<small>${r.created_at||''}</small>
</div>
</div>

<div class="ticket-line"><b>Город:</b> ${r.city||'-'}</div>
<div class="ticket-line"><b>Авто:</b> ${r.brand||''} ${r.model||''}</div>
<div class="ticket-line"><b>Категория:</b> ${r.category||''}</div>

<div class="comment">${r.description||'-'}</div>

<button class="btn red" onclick="toggle(${r.id})">Открыть заявку</button>

<div class="detail" id="d${r.id}">

<div class="ticket-line"><b>Телефон:</b> ${r.phone}</div>

<a class="btn green" href="https://wa.me/${r.phone}" target="_blank">Написать в WhatsApp</a>

<button class="btn blue" onclick="contacted(${r.match_id})">Связался</button>

</div>

</div>
`;

});

list.innerHTML=html||'<p>Заявок нет</p>';
}

function toggle(id){
let el=document.getElementById('d'+id);
el.style.display=el.style.display=='block'?'none':'block';
}

async function contacted(id){
await fetch(API+'/update-match-status/',{
method:'POST',
credentials:'include',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({match_id:id,status:'contacted'})
});
loadRequests();
}

loadProfile();
setPeriod('all');
</script>

</body>
</html>
