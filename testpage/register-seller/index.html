<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Регистрация продавца — Market Parts</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#f5f5f5;color:#222}
.wrap{max-width:760px;margin:auto;padding:24px 16px 48px}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 6px 24px rgba(0,0,0,.08)}
h1{margin:0 0 10px;font-size:28px;color:#c62828}
.sub{margin:0 0 22px;color:#555}

.field{display:flex;flex-direction:column;margin-bottom:14px}
label{font-weight:bold;margin-bottom:5px}

input,select,button{
width:100%;
min-height:46px;
border-radius:10px;
border:1px solid #d7d7d7;
padding:0 14px;
font-size:15px;
}

.submit-btn{
background:#c62828;
color:#fff;
border:none;
font-weight:bold;
cursor:pointer;
}

.msg{margin-top:14px;padding:12px;border-radius:10px;display:none}
.msg.error{display:block;background:#ffebee;color:#b71c1c}
.msg.success{display:block;background:#e8f5e9;color:#1b5e20}

.check-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.check-row input{width:auto}
</style>
</head>

<body>

<div class="wrap">
<div class="card">

<h1>Регистрация продавца</h1>

<p class="sub">
Зарегистрируйтесь и получайте заявки покупателей.
</p>

<form id="sellerForm">

<div class="field">
<label>Название магазина</label>
<input id="name" required>
</div>

<div class="field">
<label>WhatsApp</label>
<input id="whatsapp" placeholder="8707XXXXXXX" required>
</div>

<!-- ПАРОЛЬ -->
<div class="field">
<label>Пароль</label>
<input id="password" type="password">
</div>

<div class="field">
<label>Повторите пароль</label>
<input id="password2" type="password">
</div>

<div class="field">
<label class="check-row">
<input type="checkbox" onclick="
password.type=this.checked?'text':'password';
password2.type=this.checked?'text':'password';
">
Показать пароль
</label>
</div>

<div class="field">
<label>Город</label>
<select id="city" required>
<option value="">Выберите город</option>
<option>Алматы</option>
<option>Астана</option>
<option>Шымкент</option>
<option>Караганда</option>
</select>
</div>

<button class="submit-btn">Зарегистрироваться</button>

</form>

<div id="msg" class="msg"></div>

</div>
</div>

<script>
const API='https://zpt-kz-backend.onrender.com/api';
const nameEl = document.getElementById('name');
const whatsappEl = document.getElementById('whatsapp');
const passwordEl = document.getElementById('password');
const password2El = document.getElementById('password2');
const cityEl = document.getElementById('city');
const msg = document.getElementById('msg');

function setMessage(text,type){
msg.className='msg '+type;
msg.innerText=text;
}

function normalizePhone(v){
return v.replace(/\D/g,'');
}

document.getElementById('sellerForm').addEventListener('submit',async function(e){

e.preventDefault();

let name=nameEl.value.trim();
let whatsapp=normalizePhone(whatsappEl.value);
let password=passwordEl.value;
let password2=password2El.value;

if(password.length<6){
setMessage('Пароль минимум 6 символов','error');
return;
}

if(password!==password2){
setMessage('Пароли не совпадают','error');
return;
}

let res=await fetch(API+'/create-seller/',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
name,
whatsapp,
password,
password_confirm:password2,
transport_type:'car',
city:cityEl.value
})
});

let data=await res.json();

if(data.error){
setMessage(data.error,'error');
return;
}

setMessage('Регистрация успешна','success');

});
</script>

</body>
</html>
