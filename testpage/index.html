<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Parts</title>

<style>
:root {
  --accent: #d92d20;
  --bg: #f5f6f8;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
}

.container {
  max-width: 520px;
  margin: 0 auto;
  padding: 16px;
}

.logo {
  font-size: 28px;
  font-weight: bold;
  color: var(--accent);
  margin-bottom: 20px;
}

.block {
  background: #fff;
  padding: 18px;
  border-radius: 16px;
  margin-bottom: 14px;
}

.block h2 {
  margin: 0 0 8px;
}

.btn {
  display: block;
  margin-top: 10px;
  background: var(--accent);
  color: #fff;
  padding: 12px;
  text-align: center;
  border-radius: 10px;
  text-decoration: none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">Market Parts</div>

<div class="block">
<h2>Продажи запчастей</h2>
<p>Выберите товар и свяжитесь с продавцом</p>
<a href="#" class="btn">Перейти в магазин</a>
</div>

<div class="block">
<h2>Заявки продавцам</h2>
<p>Одна заявка — предложения от продавцов</p>
<a href="request-parts/" class="btn">Оставить заявку</a>
</div>

<div class="block">
<h2>Автоуслуги</h2>
<p>СТО, шины, детейлинг — один запрос всем</p>
<a href="#" class="btn">Оставить заявку</a>
</div>

</div>

</body>
</html>
