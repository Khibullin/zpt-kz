<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Market Parts</title>

  <style>
    :root {
      --bg:#f4f5f7;
      --card:#ffffff;
      --text:#1f2328;
      --muted:#667085;
      --accent:#d92d20;
      --dark:#111827;
      --shadow:0 10px 30px rgba(0,0,0,0.08);
      --radius:20px;
    }

    body {
      margin:0;
      font-family:Arial;
      background:var(--bg);
    }

    .container {
      max-width:540px;
      margin:auto;
      padding:16px;
    }

    .brand {
      font-size:28px;
      font-weight:bold;
      margin-bottom:20px;
    }

    .hero {
      background:#fff;
      padding:20px;
      border-radius:20px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    .hero h1 {
      margin:0 0 10px;
      font-size:22px;
    }

    .card {
      background:#fff;
      padding:16px;
      border-radius:18px;
      margin-bottom:12px;
      box-shadow:var(--shadow);
    }

    .btn {
      display:block;
      margin-top:10px;
      padding:12px;
      text-align:center;
      background:var(--accent);
      color:#fff;
      border-radius:10px;
      text-decoration:none;
    }

  </style>
</head>

<body>

<div class="container">

<div class="brand">Market Parts</div>

<div class="hero">
<h1>Запчасти, заявки и автоуслуги — в одном месте</h1>
<p>Отправьте одну заявку или найдите товар напрямую</p>
</div>

<div class="card">
<h3>Продажи запчастей</h3>
<a href="#" class="btn">Перейти в магазин</a>
</div>

<div class="card">
<h3>Заявки продавцам</h3>
<a href="request-parts/" class="btn">Оставить заявку</a>
</div>

<div class="card">
<h3>Автоуслуги</h3>
<a href="#" class="btn">Оставить заявку</a>
</div>

</div>

</body>
</html>
