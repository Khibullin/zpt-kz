<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Parts</title>

  <style>
    :root {
      --bg: #f4f5f7;
      --card: #ffffff;
      --text: #1f2328;
      --muted: #667085;
      --line: #e6e8ec;
      --accent: #d92d20;
      --accent-dark: #b42318;
      --soft: #fff3f2;
      --dark: #111827;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 540px;
      margin: 0 auto;
      padding: 16px;
    }

    .brand-top {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .brand-main {
      font-size: 30px;
      font-weight: 800;
      color: var(--accent); /* 🔴 ВАЖНО */
      margin-bottom: 20px;
    }

    .block {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }

    .block h2 {
      margin: 0 0 6px;
    }

    .block p {
      margin: 0 0 10px;
      color: var(--muted);
    }

    .btn {
      display: block;
      text-align: center;
      background: var(--accent);
      color: #fff;
      padding: 12px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="container">

<div class="brand-top">ZPT.KZ</div>
<div class="brand-main">Market Parts</div>

<div class="block">
<h2>Продажи запчастей и аксессуаров</h2>
<p>Выберите товар и свяжитесь с продавцом напрямую</p>
<a href="#" class="btn">Перейти в магазин</a>
</div>

<div class="block">
<h2>Заявки продавцам</h2>
<p>Отправьте одну заявку и получите предложения</p>
<a href="request-parts/" class="btn">Оставить заявку</a>
</div>

<div class="block">
<h2>Автоуслуги и сервис</h2>
<p>СТО, шины, детейлинг — один запрос всем партнёрам</p>
<a href="#" class="btn">Оставить заявку</a>
</div>

</div>

</body>
</html>
