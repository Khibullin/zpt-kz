<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заявка на запчасти — Market Parts</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      color: #c62828;
    }

    .sub {
      margin: 0 0 22px;
      color: #555;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 14px;
      font-weight: bold;
    }

    input, select, textarea, button {
      width: 100%;
      min-height: 46px;
      border-radius: 12px;
      border: 1px solid #d8d8d8;
      padding: 0 14px;
      font-size: 16px;
    }

    textarea {
      min-height: 100px;
      padding: 10px;
    }

    .submit-btn {
      background: #d6281f;
      color: #fff;
      border: none;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .msg {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      display: none;
      white-space: pre-line;
    }

    .msg.success {
      display: block;
      background: #e8f5e9;
    }

    .seller {
      margin-top: 10px;
    }

    .wa-btn {
      display: inline-block;
      margin-top: 4px;
      padding: 6px 10px;
      background: #25D366;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
    }

  </style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <h1>Заявка на запчасти</h1>
    <p class="sub">Оставьте одну заявку, и её получат продавцы автозапчастей.</p>

    <form id="requestForm">
      <div class="grid">

        <div class="field full">
          <label>Страна</label>
          <select id="country"></select>
        </div>

        <div class="field">
          <label>Марка</label>
          <select id="brand"></select>
        </div>

        <div class="field">
          <label>Модель</label>
          <select id="model"></select>
        </div>

        <div class="field">
          <label>Категория</label>
          <input id="category">
        </div>

        <div class="field">
          <label>Город</label>
          <input id="city">
        </div>

        <div class="field">
          <label>Телефон</label>
          <input id="phone">
        </div>

        <div class="field full">
          <label>Описание</label>
          <textarea id="description"></textarea>
        </div>

        <div class="field full">
          <button class="submit-btn">Отправить заявку</button>
        </div>

      </div>
    </form>

    <div id="msg" class="msg"></div>

  </div>
</div>

<script>

const API = 'https://zpt-kz-backend.onrender.com/api';

const form = document.getElementById('requestForm');
const msg = document.getElementById('msg');

function buildWhatsAppLink(phone, data) {
  const text = encodeURIComponent(
`Здравствуйте! Пишу по заявке №${data.id} с сайта ZPT.KZ.

${data.brand} ${data.model}, категория: ${data.category}
Город: ${data.city}

${data.description}

Подскажите, есть ли в наличии?`
  );

  return `https://wa.me/${phone}?text=${text}`;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const payload = {
    country: document.getElementById('country').value,
    brand: document.getElementById('brand').value,
    model: document.getElementById('model').value,
    category: document.getElementById('category').value,
    description: document.getElementById('description').value,
    city: document.getElementById('city').value,
    phone: document.getElementById('phone').value,
    transport_type: 'car'
  };

  const res = await fetch(`${API}/create-request/`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });

  const data = await res.json();

let html = `Заявка отправлена! ID: ${data.id}\n\n`;

html += `Найдено продавцов: ${data.matches}\n\n`;

html += `Ваша заявка отправлена всем подходящим продавцам по выбранной категории и параметрам.\n`;
html += `Ожидайте предложения — продавцы сами свяжутся с вами.\n\n`;
html += `При желании вы можете самостоятельно написать любому продавцу из списка ниже.\n\n`;

if (data.sellers && data.sellers.length > 0) {
  html += `Первые продавцы:\n\n`;

  data.sellers.forEach(s => {
    const text = encodeURIComponent(
`Здравствуйте! Пишу по заявке №${data.id} с сайта ZPT.KZ.

${selectedBrand} ${selectedModel}, категория: ${payload.category}
Город: ${payload.city}

${payload.description}

Подскажите, есть ли в наличии?`
    );

    const link = `https://wa.me/${s.whatsapp}?text=${text}`;

    html += `${s.name}\n`;
    html += `<a href="${link}" target="_blank" style="display:inline-block;margin:5px 0 10px;padding:6px 10px;background:#25D366;color:#fff;border-radius:8px;text-decoration:none;">Написать в WhatsApp</a>\n\n`;
  });
}

if (data.matches > 10) {
  html += `Ещё ${data.matches - 10} продавцов также получили вашу заявку.`;
}

msg.innerHTML = html;
msg.className = 'msg success';

  if (data.sellers && data.sellers.length > 0) {
    html += `Первые продавцы:\n`;

    data.sellers.forEach(s => {
      const link = buildWhatsAppLink(s.whatsapp, {
        id: data.id,
        brand: payload.brand,
        model: payload.model,
        category: payload.category,
        description: payload.description,
        city: payload.city
      });

      html += `\n${s.name}\n`;
      html += `<a class="wa-btn" target="_blank" href="${link}">Написать в WhatsApp</a>\n`;
    });
  }

  if (data.matches > 10) {
    html += `\n\nЕщё ${data.matches - 10} продавцов также получили вашу заявку.`;
  }

  msg.className = 'msg success';
  msg.innerHTML = html;

});

</script>

</body>
</html>
