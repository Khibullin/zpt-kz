<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заявка на запчасть</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f5f7;
}

.container {
    max-width: 500px;
    margin: 0 auto;
    padding: 16px;
}

.header {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
}

.subtext {
    color: #666;
    font-size: 14px;
    margin-bottom: 20px;
}

.block {
    background: #fff;
    padding: 16px;
    border-radius: 14px;
    margin-bottom: 14px;
}

.block h3 {
    margin-bottom: 10px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
}

textarea {
    resize: none;
    height: 80px;
}

.btn {
    width: 100%;
    padding: 14px;
    background: #e53935;
    color: #fff;
    border-radius: 12px;
    text-align: center;
    font-weight: bold;
    border: none;
}

.note {
    text-align: center;
    font-size: 13px;
    color: #777;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">Заявка на запчасть</div>
<div class="subtext">Отправьте одну заявку и получите предложения от продавцов</div>

<form>

<div class="block">
<h3>Автомобиль</h3>

<input type="text" placeholder="Марка" required>
<input type="text" placeholder="Модель" required>
<input type="text" placeholder="Год">
</div>

<div class="block">
<h3>Запчасть</h3>

<input type="text" placeholder="Название запчасти" required>

<!-- 🔥 ДОБАВЛЕННОЕ ПОЛЕ -->
<input type="text" placeholder="Артикул (если есть)">

<textarea placeholder="Описание (состояние, детали)"></textarea>
</div>

<div class="block">
<h3>Контакт</h3>

<input type="text" placeholder="Ваше имя" required>
<input type="tel" placeholder="Телефон / WhatsApp" required>
</div>

<button class="btn">Отправить заявку</button>

</form>

<div class="note">
Один запрос отправляется сразу нескольким продавцам
</div>

</div>

</body>
</html>
