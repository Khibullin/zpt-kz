<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заявка</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f4f5f7;
}

.container {
  max-width:520px;
  margin:auto;
  padding:16px;
}

.logo {
  font-size:24px;
  font-weight:bold;
  margin-bottom:10px;
}

.nav a {
  margin-right:10px;
  text-decoration:none;
  color:#333;
}

.block {
  background:#fff;
  padding:16px;
  border-radius:14px;
  margin-bottom:12px;
}

input,select,textarea {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:14px;
  background:#d92d20;
  color:#fff;
  border:none;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">Market Parts</div>

<div class="nav">
<a href="../">Главная</a>
</div>

<div class="block">

<select><option>Страна</option></select>
<select><option>Марка</option></select>
<select><option>Модель</option></select>

<select><option>Категория</option></select>

<input placeholder="Артикул">

<textarea placeholder="Описание"></textarea>

<select><option>Город</option></select>

<input placeholder="Телефон">

<button>Отправить заявку</button>

</div>

</div>

</body>
</html>
