<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заявка — Market Parts</title>

<style>
:root {
  --accent: #d92d20;
  --bg: #f5f6f8;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
}

.container {
  max-width: 520px;
  margin: 0 auto;
  padding: 16px;
}

.logo {
  font-size: 26px;
  font-weight: bold;
  color: var(--accent); /* 🔴 ВАЖНО */
  margin-bottom: 10px;
}

.nav {
  margin-bottom: 20px;
}

.nav a {
  margin-right: 10px;
  color: #333;
  text-decoration: none;
}

.intro {
  background: #fff;
  padding: 14px;
  border-radius: 14px;
  margin-bottom: 14px;
}

.form {
  background: #fff;
  padding: 16px;
  border-radius: 14px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border-radius: 10px;
  border: none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">Market Parts</div>

<div class="nav">
<a href="../">Главная</a>
<a href="#">Кабинет</a>
<a href="#">Выход</a>
</div>

<div class="intro">
Нужны запчасти для авто? Отправьте заявку — продавцы сами напишут в WhatsApp
</div>

<div class="form">

<select>
<option>Выберите страну</option>
</select>

<select>
<option>Сначала выберите страну</option>
</select>

<select>
<option>Сначала выберите марку</option>
</select>

<select>
<option>Выберите категорию</option>
</select>

<input type="text" placeholder="Артикул (если есть)">

<textarea placeholder="Опишите запчасть"></textarea>

<select>
<option>Выберите город</option>
</select>

<input type="tel" placeholder="Телефон / WhatsApp">

<button class="btn">Отправить заявку</button>

</div>

</div>

</body>
</html>
