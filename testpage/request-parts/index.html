<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заявка на запчасти — Market Parts</title>

<style>
:root {
  --bg:#f4f5f7;
  --card:#ffffff;
  --text:#1f2328;
  --muted:#667085;
  --accent:#d92d20;
  --shadow:0 10px 30px rgba(0,0,0,0.08);
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.container {
  max-width:560px;
  margin:auto;
  padding:16px;
}

.header {
  margin-bottom:20px;
}

.logo {
  font-size:26px;
  font-weight:800;
  color:var(--accent);
}

.nav a {
  margin-right:12px;
  color:#333;
  text-decoration:none;
  font-size:14px;
}

.hero {
  background:#fff;
  padding:18px;
  border-radius:18px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}

.hero h1 {
  margin:0 0 6px;
  font-size:20px;
}

.hero p {
  margin:0;
  color:var(--muted);
  font-size:14px;
}

.card {
  background:#fff;
  padding:18px;
  border-radius:20px;
  box-shadow:var(--shadow);
}

.title {
  font-size:22px;
  font-weight:700;
  margin-bottom:14px;
}

.field {
  margin-bottom:14px;
}

.label {
  font-size:14px;
  font-weight:600;
  margin-bottom:6px;
  display:block;
}

input, select, textarea {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
  box-sizing:border-box;
}

textarea {
  min-height:90px;
  resize:none;
}

.transport-tabs {
  display:flex;
  gap:8px;
}

.transport-tabs .tab {
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:10px;
  background:#f0f0f0;
  cursor:pointer;
  font-weight:600;
  user-select:none;
}

.transport-tabs .tab.active {
  background:var(--accent);
  color:#fff;
}

.btn {
  width:100%;
  padding:14px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  margin-top:6px;
  cursor:pointer;
}

.note {
  margin-top:10px;
  font-size:13px;
  color:#777;
  text-align:center;
}

.error {
  color:#b42318;
  font-size:13px;
  margin-top:8px;
  display:none;
}

.success {
  color:#167c2f;
  font-size:13px;
  margin-top:8px;
  display:none;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">Market Parts</div>
    <div class="nav">
      <a href="../">Главная</a>
    </div>
  </div>

  <div class="hero">
    <h1>Нужны запчасти для авто?</h1>
    <p>Отправьте заявку — продавцы сами свяжутся с вами в WhatsApp</p>
  </div>

  <div class="card">

    <div class="title">Заявка на запчасти</div>

    <form id="requestForm">

      <div class="field">
        <label class="label">Тип транспорта</label>

        <div class="transport-tabs">
          <div class="tab active" data-value="car">Легковые</div>
          <div class="tab" data-value="truck">Грузовые</div>
        </div>

        <input type="hidden" id="transportType" value="car">
      </div>

      <div class="field">
        <label class="label" for="country">Страна производителя</label>
        <select id="country">
          <option value="">Загрузка стран...</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="brand">Марка автомобиля</label>
        <select id="brand">
          <option value="">Сначала выберите страну</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="model">Модель автомобиля</label>
        <select id="model">
          <option value="">Сначала выберите марку</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="category">Категория запчасти</label>
        <select id="category">
          <option value="">Выберите категорию</option>
          <option>Двигатель</option>
          <option>Ходовая часть</option>
          <option>Кузов</option>
          <option>Тормозная система</option>
          <option>Электрика</option>
          <option>Трансмиссия</option>
          <option>Салон</option>
          <option>Оптика</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="article">Артикул</label>
        <input id="article" type="text" placeholder="Если есть, укажите артикул">
      </div>

      <div class="field">
        <label class="label" for="description">Опишите нужную запчасть</label>
        <textarea id="description" placeholder="Например: передний амортизатор"></textarea>
      </div>

      <div class="field">
        <label class="label" for="city">Город</label>
        <select id="city">
          <option value="">Выберите город</option>
          <option>Алматы</option>
          <option>Астана</option>
          <option>Шымкент</option>
          <option>Караганда</option>
          <option>Актобе</option>
          <option>Атырау</option>
          <option>Павлодар</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="phone">Телефон / WhatsApp</label>
        <input id="phone" type="tel" placeholder="77071234567">
      </div>

      <button class="btn" type="submit">Отправить заявку</button>
      <div class="error" id="error">Заполните описание и телефон</div>
      <div class="success" id="success"></div>

    </form>

    <div class="note">
      Один запрос отправляется сразу нескольким продавцам
    </div>

  </div>

</div>

<script>
const tabs = document.querySelectorAll('.tab');
const transport = document.getElementById('transportType');
const form = document.getElementById('requestForm');
const errorBox = document.getElementById('error');
const successBox = document.getElementById('success');

const countrySelect = document.getElementById('country');
const brandSelect = document.getElementById('brand');
const modelSelect = document.getElementById('model');

tabs.forEach(tab => {
  tab.onclick = () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    transport.value = tab.dataset.value;
  };
});

async function loadCountries() {
  countrySelect.innerHTML = '<option value="">Загрузка стран...</option>';

  try {
    const response = await fetch('/api/countries/');
    const data = await response.json();

    countrySelect.innerHTML = '<option value="">Выберите страну</option>';

    data.countries.forEach(country => {
      const option = document.createElement('option');
      option.value = country.id;
      option.textContent = country.name;
      countrySelect.appendChild(option);
    });
  } catch (error) {
    countrySelect.innerHTML = '<option value="">Ошибка загрузки стран</option>';
  }
}

countrySelect.addEventListener('change', async function () {
  const countryId = this.value;

  brandSelect.innerHTML = '<option value="">Загрузка...</option>';
  modelSelect.innerHTML = '<option value="">Сначала выберите марку</option>';

  if (!countryId) {
    brandSelect.innerHTML = '<option value="">Сначала выберите страну</option>';
    return;
  }

  try {
    const response = await fetch(`/api/brands-by-country/?country_id=${countryId}`);
    const data = await response.json();

    brandSelect.innerHTML = '<option value="">Выберите марку</option>';

    data.brands.forEach(brand => {
      const option = document.createElement('option');
      option.value = brand.id;
      option.textContent = brand.name;
      brandSelect.appendChild(option);
    });
  } catch (error) {
    brandSelect.innerHTML = '<option value="">Ошибка загрузки марок</option>';
  }
});

brandSelect.addEventListener('change', async function () {
  const brandId = this.value;

  modelSelect.innerHTML = '<option value="">Загрузка...</option>';

  if (!brandId) {
    modelSelect.innerHTML = '<option value="">Сначала выберите марку</option>';
    return;
  }

  try {
    const response = await fetch(`/api/models-by-brand/?brand_id=${brandId}`);
    const data = await response.json();

    modelSelect.innerHTML = '<option value="">Выберите модель</option>';

    data.models.forEach(model => {
      const option = document.createElement('option');
      option.value = model.name;
      option.textContent = model.name;
      modelSelect.appendChild(option);
    });
  } catch (error) {
    modelSelect.innerHTML = '<option value="">Ошибка загрузки моделей</option>';
  }
});

form.onsubmit = async function(e) {
  e.preventDefault();

  const selectedCountryText = countrySelect.options[countrySelect.selectedIndex]?.text || '';
  const selectedBrandText = brandSelect.options[brandSelect.selectedIndex]?.text || '';
  const selectedModelText = modelSelect.value || '';

  const data = {
    transport_type: transport.value,
    country: countrySelect.value ? selectedCountryText : '',
    brand: brandSelect.value ? selectedBrandText : '',
    model: selectedModelText,
    category: document.getElementById('category').value,
    article: document.getElementById('article').value,
    description: document.getElementById('description').value,
    city: document.getElementById('city').value,
    phone: document.getElementById('phone').value
  };

  if (!data.description || !data.phone) {
    errorBox.style.display = 'block';
    successBox.style.display = 'none';
    return;
  }

  errorBox.style.display = 'none';

  try {
    const response = await fetch('/api/create-request/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    if (result.status === 'ok') {
      successBox.innerText = 'Заявка отправлена! ID: ' + result.id;
      successBox.style.display = 'block';
      form.reset();
      transport.value = 'car';
      tabs.forEach(t => t.classList.remove('active'));
      tabs[0].classList.add('active');
      brandSelect.innerHTML = '<option value="">Сначала выберите страну</option>';
      modelSelect.innerHTML = '<option value="">Сначала выберите марку</option>';
      await loadCountries();
    } else {
      errorBox.innerText = 'Ошибка отправки заявки';
      errorBox.style.display = 'block';
      successBox.style.display = 'none';
    }
  } catch (error) {
    errorBox.innerText = 'Ошибка соединения с сервером';
    errorBox.style.display = 'block';
    successBox.style.display = 'none';
  }
};

loadCountries();
</script>

</body>
</html>
