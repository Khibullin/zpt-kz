<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заявка на запчасти — Market Parts</title>

<style>
:root {
  --bg:#f4f5f7;
  --card:#ffffff;
  --text:#1f2328;
  --muted:#667085;
  --accent:#d92d20;
  --shadow:0 10px 30px rgba(0,0,0,0.08);
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
}

.container {
  max-width:560px;
  margin:auto;
  padding:16px;
}

.header {
  margin-bottom:20px;
}

.logo {
  font-size:26px;
  font-weight:800;
  color:var(--accent);
}

.nav a {
  margin-right:12px;
  color:#333;
  text-decoration:none;
  font-size:14px;
}

.hero {
  background:#fff;
  padding:18px;
  border-radius:18px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}

.hero h1 {
  margin:0 0 6px;
  font-size:20px;
}

.hero p {
  margin:0;
  color:var(--muted);
  font-size:14px;
}

.card {
  background:#fff;
  padding:18px;
  border-radius:20px;
  box-shadow:var(--shadow);
}

.title {
  font-size:22px;
  font-weight:700;
  margin-bottom:14px;
}

.field {
  margin-bottom:14px;
}

.label {
  font-size:14px;
  font-weight:600;
  margin-bottom:6px;
  display:block;
}

input, select, textarea {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

textarea {
  min-height:90px;
  resize:none;
}

/* ТАБЫ */
.transport-tabs {
  display:flex;
  gap:8px;
}

.transport-tabs .tab {
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:10px;
  background:#f0f0f0;
  cursor:pointer;
  font-weight:600;
}

.transport-tabs .tab.active {
  background:var(--accent);
  color:#fff;
}

.btn {
  width:100%;
  padding:14px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  margin-top:6px;
}

.note {
  margin-top:10px;
  font-size:13px;
  color:#777;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="logo">Market Parts</div>
  <div class="nav">
    <a href="../">Главная</a>
  </div>
</div>

<div class="hero">
  <h1>Нужны запчасти для авто?</h1>
  <p>Отправьте заявку — продавцы сами свяжутся с вами в WhatsApp</p>
</div>

<div class="card">

<div class="title">Заявка на запчасти</div>

<form id="requestForm">

<!-- 🔥 ТИП ТРАНСПОРТА -->
<div class="field">
<label class="label">Тип транспорта</label>

<div class="transport-tabs">
  <div class="tab active" data-value="car">Легковые</div>
  <div class="tab" data-value="truck">Грузовые</div>
</div>

<input type="hidden" name="transport_type" id="transportType" value="car">

</div>

<div class="field">
<label class="label">Страна производителя</label>
<select><option>Выберите страну</option></select>
</div>

<div class="field">
<label class="label">Марка автомобиля</label>
<select><option>Сначала выберите страну</option></select>
</div>

<div class="field">
<label class="label">Модель автомобиля</label>
<select><option>Сначала выберите марку</option></select>
</div>

<div class="field">
<label class="label">Категория запчасти</label>
<select><option>Выберите категорию</option></select>
</div>

<div class="field">
<label class="label">Артикул</label>
<input type="text" placeholder="Если есть, укажите артикул">
</div>

<div class="field">
<label class="label">Опишите нужную запчасть</label>
<textarea placeholder="Например: передний амортизатор"></textarea>
</div>

<div class="field">
<label class="label">Город</label>
<select><option>Выберите город</option></select>
</div>

<div class="field">
<label class="label">Телефон / WhatsApp</label>
<input type="tel" placeholder="77071234567">
</div>

<button class="btn">Отправить заявку</button>

</form>

<div class="note">
Один запрос отправляется сразу нескольким продавцам
</div>

</div>

</div>

<script>
// 🔥 ПЕРЕКЛЮЧЕНИЕ ТАБОВ
const tabs = document.querySelectorAll('.tab');
const input = document.getElementById('transportType');

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    input.value = tab.dataset.value;
  });
});
</script>

</body>
</html>
